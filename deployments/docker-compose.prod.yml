services:
  aegis-waf-backend:
    image: aegis-waf-backend:v2
    container_name: aegis-waf-backend
    network_mode: host
    restart: unless-stopped
    command: ["./aegis-waf", "--config", "configs/config.docker.yaml"]
    volumes:
      - ./configs/config.docker.yaml:/app/configs/config.docker.yaml:ro
      - ./data:/app/data
      - ./logs:/app/logs

  aegis-waf-frontend:
    image: aegis-waf-frontend:v1
    container_name: aegis-waf-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - aegis-waf-backend
