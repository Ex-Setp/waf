services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: aegis-waf-backend:v1
    container_name: aegis-waf-backend
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - ./rules:/app/rules
      - ./configs/config.docker.yaml:/app/configs/config.docker.yaml:ro
    environment:
      TZ: Asia/Shanghai
    ports:
      - "8088:8088"
    networks:
      - aegis-waf

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: aegis-waf-frontend:v1
    container_name: aegis-waf-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"
    networks:
      - aegis-waf

networks:
  aegis-waf:
    driver: bridge
