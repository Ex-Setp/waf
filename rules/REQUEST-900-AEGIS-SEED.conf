# Aegis-WAF local CRS-style seed rules for stage T020-T024 and T120 validation.
SecRule ARGS "@contains union select" "id:942100,phase:2,deny,status:403,msg:'SQL injection pattern: union select',severity:'CRITICAL'"
SecRule REQUEST_URI "@contains <script" "id:941100,phase:2,deny,status:403,msg:'XSS pattern: script tag',severity:'CRITICAL'"
SecRule ARGS "@contains ;cat /etc/passwd" "id:932100,phase:2,deny,status:403,msg:'Command injection pattern: shell command chaining',severity:'CRITICAL'"
SecRule ARGS "@contains |id" "id:932110,phase:2,deny,status:403,msg:'Command injection pattern: pipe execution',severity:'CRITICAL'"
SecRule REQUEST_HEADERS "@contains sqlmap" "id:913100,phase:1,deny,status:403,msg:'Malicious scanner User-Agent: sqlmap',severity:'CRITICAL'"
SecRule REQUEST_URI "@contains ../" "id:930100,phase:2,deny,status:403,msg:'Path traversal pattern',severity:'CRITICAL'"
SecRule REQUEST_URI "@contains /etc/passwd" "id:930110,phase:2,deny,status:403,msg:'Sensitive file path traversal target',severity:'CRITICAL'"
