# ============================================================
# Aegis-WAF CRS-style Seed Rules
# Stage: T020-T024, T120 Validation
# ============================================================
# 本文件为 Aegis-WAF 核心种子规则
# 包含 7 条代表性规则，覆盖主要攻击类型的基础检测
# 用于验证 WAF 核心检测管道是否正常工作
# ============================================================

# ------------------------------------------------------------------
# Phase 1: 请求头检测
# ------------------------------------------------------------------

# [913100] 恶意扫描器 User-Agent 检测
# 增强：覆盖更多扫描器变体，使用正则 + 大小写不敏感
SecRule REQUEST_HEADERS:User-Agent "@rx (?i)(sqlmap|nikto|nmap|w3af|acunetix|netsparker)" \
    "id:913100,phase:1,deny,status:403,msg:'Malicious Scanner User-Agent Detected',severity:'CRITICAL',tag:'attack-reputation-scanner'"

# ------------------------------------------------------------------
# Phase 2: 请求体/URI/参数检测
# ------------------------------------------------------------------

# [942100] SQL 注入: UNION SELECT
# 增强：正则匹配，覆盖 UNION ALL/DISTINCT 变体
SecRule ARGS|ARGS_NAMES "@rx (?i)(union\s+(all\s+)?(distinct\s+)?select\s+)" \
    "id:942100,phase:2,deny,status:403,msg:'SQL Injection: UNION SELECT Detected',severity:'CRITICAL',tag:'attack-sqli'"

# [941100] XSS: 脚本标签
# 增强：正则匹配，覆盖大小写和空格变体
SecRule REQUEST_URI|ARGS|ARGS_NAMES "@rx (?i)<\s*script[^>]*>" \
    "id:941100,phase:2,deny,status:403,msg:'XSS: Script Tag Detected',severity:'CRITICAL',tag:'attack-xss'"

# [932100] 命令注入: Shell 命令链
# 增强：覆盖更多敏感命令，正则匹配
SecRule ARGS|ARGS_NAMES "@rx (?i)(;\s*(cat|curl|wget|nc|bash|sh|python|perl|ruby|php)\s+)" \
    "id:932100,phase:2,deny,status:403,msg:'Command Injection: Shell Command Chaining Detected',severity:'CRITICAL',tag:'attack-rce'"

# [932110] 命令注入: 管道执行
# 增强：覆盖更多命令，正则匹配
SecRule ARGS|ARGS_NAMES "@rx (?i)\|\s*(cat|curl|wget|nc|bash|sh|python|perl|ruby|php|id|whoami|uname|ls)" \
    "id:932110,phase:2,deny,status:403,msg:'Command Injection: Pipe Execution Detected',severity:'CRITICAL',tag:'attack-rce'"

# [930100] 路径遍历: ../ 模式
# 增强：同时检测 URI 和参数，覆盖 Windows 反斜杠
SecRule REQUEST_URI|ARGS|ARGS_NAMES "@rx (\.\./|\.\.\\)" \
    "id:930100,phase:2,deny,status:403,msg:'Path Traversal: Directory Traversal Detected',severity:'CRITICAL',tag:'attack-lfi'"

# [930110] 路径遍历: 敏感文件
# 增强：覆盖更多敏感文件，同时检测 URI 和参数
SecRule REQUEST_URI|ARGS|ARGS_NAMES "@rx /(etc/passwd|etc/shadow|etc/hosts|etc/fstab|proc/self/environ|windows/win\.ini)" \
    "id:930110,phase:2,deny,status:403,msg:'Path Traversal: Sensitive File Target Detected',severity:'CRITICAL',tag:'attack-lfi'"
