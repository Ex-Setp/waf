# ============================================================
# Aegis-WAF T149 SQLi and NoSQLi Rule Pack
# ============================================================
# 覆盖：SQL 注入 (MySQL/PostgreSQL/SQL Server/Oracle)
#       + NoSQL 注入 (MongoDB)
# ============================================================

# ------------------------------------------------------------------
# 1. 基础检测 (901001-901009)
# ------------------------------------------------------------------

# [901001] UNION SELECT 数据提取 (原有规则增强)
SecRule ARGS|ARGS_NAMES|REQUEST_HEADERS|XML:/* "@rx (?i)(union\s+(all\s+)?(distinct\s+)?select\s+)" \
    "id:901001,phase:2,deny,log,msg:'SQLi: UNION SELECT Data Extraction Probe',severity:'ERROR',tag:'attack-sqli'"

# [901002] 布尔盲注/逻辑绕过 (原有规则增强)
SecRule ARGS|ARGS_NAMES "@rx (?i)(or\s+\d+=\d+|and\s+\d+=\d+|or\s+1=1|and\s+1=1|or\s+1=2|xor\s+\d+=\d+|not\s+\d+=\d+)" \
    "id:901002,phase:2,deny,log,msg:'SQLi: Boolean Tautology Authentication Bypass',severity:'ERROR',tag:'attack-sqli'"

# [901003] 时间盲注 (原有规则增强)
SecRule ARGS|ARGS_NAMES "@rx (?i)(sleep\s*\(|benchmark\s*\(|pg_sleep\s*\(|waitfor\s+delay\s+|dbms_lock\.sleep\s*\(|delay\s+\d+)" \
    "id:901003,phase:2,deny,log,msg:'SQLi: Time-based Blind Injection',severity:'ERROR',tag:'attack-sqli'"

# [901004] 报错注入 (原有规则增强)
SecRule ARGS|ARGS_NAMES "@rx (?i)(extractvalue\s*\(|updatexml\s*\(|floor\s*\(rand\s*\(\s*0\s*\)\s*\*|name_const\s*\(|cast\s*\(|convert\s*\()" \
    "id:901004,phase:2,deny,log,msg:'SQLi: Error-based Extraction Function',severity:'ERROR',tag:'attack-sqli'"

# [901005] 数据库指纹/元数据枚举 (原有规则增强)
SecRule ARGS|ARGS_NAMES "@rx (?i)(information_schema|schema\s*\(|version\s*\(|database\s*\(|user\s*\(|current_user|system_user|@@version|@@datadir)" \
    "id:901005,phase:2,deny,log,msg:'SQLi: Metadata Schema Enumeration',severity:'INFO',tag:'attack-sqli'"

# [901006] NoSQL: MongoDB $where 操作符 (原有规则增强)
SecRule ARGS|ARGS_NAMES "@rx (?i)\$where" \
    "id:901006,phase:2,deny,log,msg:'NoSQLi: MongoDB $where Operator Probe',severity:'ERROR',tag:'attack-nosqli'"

# [901007] SQL 字符串边界闭合
SecRule ARGS|ARGS_NAMES "@rx (['\"]\s*(or|and)\s+['\"]|['\"]\s*=\s*['\"]|['\"]\s*\+\s*['\"])" \
    "id:901007,phase:2,deny,log,msg:'SQLi: String Boundary Closure Detected',severity:'ERROR',tag:'attack-sqli'"

# [901008] SQL 堆叠查询
SecRule ARGS|ARGS_NAMES "@rx ;\s*(select|insert|update|delete|drop|exec|execute|create|alter|truncate)\s+" \
    "id:901008,phase:2,deny,log,msg:'SQLi: Stacked Query Detected',severity:'ERROR',tag:'attack-sqli'"

# [901009] SQL 注释绕过
SecRule ARGS|ARGS_NAMES "@rx (/\*.*\*/|--\s|#\s|;\s*--|\/\*!|\*\/|--$|#.*$)" \
    "id:901009,phase:2,deny,log,msg:'SQLi: Comment Bypass Detected',severity:'ERROR',tag:'attack-sqli'"

# ------------------------------------------------------------------
# 2. DML/DDL 语句 (901010-901019)
# ------------------------------------------------------------------

# [901010] SELECT 语句检测
SecRule ARGS|ARGS_NAMES "@rx (?i)(select\s+.*\s+from\s+)" \
    "id:901010,phase:2,deny,log,msg:'SQLi: SELECT Statement Detected',severity:'ERROR',tag:'attack-sqli'"

# [901011] INSERT 语句检测
SecRule ARGS|ARGS_NAMES "@rx (?i)(insert\s+into\s+\w+\s*\([^)]*\)\s*values\s*)" \
    "id:901011,phase:2,deny,log,msg:'SQLi: INSERT Statement Detected',severity:'ERROR',tag:'attack-sqli'"

# [901012] UPDATE 语句检测
SecRule ARGS|ARGS_NAMES "@rx (?i)(update\s+\w+\s+set\s+)" \
    "id:901012,phase:2,deny,log,msg:'SQLi: UPDATE Statement Detected',severity:'ERROR',tag:'attack-sqli'"

# [901013] DELETE 语句检测
SecRule ARGS|ARGS_NAMES "@rx (?i)(delete\s+from\s+\w+)" \
    "id:901013,phase:2,deny,log,msg:'SQLi: DELETE Statement Detected',severity:'ERROR',tag:'attack-sqli'"

# [901014] DROP 语句检测
SecRule ARGS|ARGS_NAMES "@rx (?i)(drop\s+(table|database|index|view|procedure|function)\s+)" \
    "id:901014,phase:2,deny,log,msg:'SQLi: DROP Statement Detected',severity:'ERROR',tag:'attack-sqli'"

# [901015] ALTER/CREATE/TRUNCATE 语句检测
SecRule ARGS|ARGS_NAMES "@rx (?i)(alter\s+(table|database)|create\s+(table|database|index|view)|truncate\s+table\s+)" \
    "id:901015,phase:2,deny,log,msg:'SQLi: ALTER/CREATE/TRUNCATE Statement Detected',severity:'ERROR',tag:'attack-sqli'"

# ------------------------------------------------------------------
# 3. 编码/混淆绕过 (901020-901029)
# ------------------------------------------------------------------

# [901020] URL 编码绕过
SecRule ARGS|ARGS_NAMES "@rx (%27|%22|%3B|%3D|%2B|%2F|%25|%2A|%3C|%3E|%7C|%5C|%2E%2E%2F)" \
    "id:901020,phase:2,deny,log,msg:'SQLi: URL Encoded Payload Detected',severity:'ERROR',tag:'attack-sqli'"

# [901021] 双重 URL 编码绕过
SecRule ARGS|ARGS_NAMES "@rx (%2527|%2522|%253B|%253D|%252B|%252F|%2525)" \
    "id:901021,phase:2,deny,log,msg:'SQLi: Double URL Encoded Payload Detected',severity:'ERROR',tag:'attack-sqli'"

# [901022] Unicode 编码绕过
SecRule ARGS|ARGS_NAMES "@rx (%u[0-9a-f]{4}|\\\\u[0-9a-f]{4})" \
    "id:901022,phase:2,deny,log,msg:'SQLi: Unicode Encoded Payload Detected',severity:'ERROR',tag:'attack-sqli'"

# [901023] 大小写混合绕过
SecRule ARGS|ARGS_NAMES "@rx (?i)\\b(sElEcT|UnIoN|Or|AnD|UpDaTe|DeLeTe|DrOp|InSeRt)\\b" \
    "id:901023,phase:2,deny,log,msg:'SQLi: Case-Mixed Keyword Detected',severity:'INFO',tag:'attack-sqli'"

# [901024] 空格替代绕过 (使用 %0a/%0d/%09/%0b)
SecRule ARGS|ARGS_NAMES "@rx (%0a|%0d|%09|%0b|%00)" \
    "id:901024,phase:2,deny,log,msg:'SQLi: Whitespace Bypass Detected',severity:'ERROR',tag:'attack-sqli'"

# [901025] MySQL 特殊注释绕过
SecRule ARGS|ARGS_NAMES "@rx /\*![0-9]{5}.*\*/" \
    "id:901025,phase:2,deny,log,msg:'SQLi: MySQL Special Comment Bypass Detected',severity:'ERROR',tag:'attack-sqli'"

# ------------------------------------------------------------------
# 4. MySQL 特定规则 (901030-901039)
# ------------------------------------------------------------------

# [901030] MySQL 特定函数
SecRule ARGS|ARGS_NAMES "@rx (?i)(load_file\s*\(|into\s+(outfile|dumpfile)\s+|system\s+|exec\s*\(|mysql_query|mysqli_query)" \
    "id:901030,phase:2,deny,log,msg:'SQLi: MySQL Specific Function Detected',severity:'ERROR',tag:'attack-sqli'"

# [901031] MySQL 用户定义变量
SecRule ARGS|ARGS_NAMES "@rx @[a-zA-Z_][a-zA-Z0-9_]*\s*:=" \
    "id:901031,phase:2,deny,log,msg:'SQLi: MySQL User Variable Detected',severity:'ERROR',tag:'attack-sqli'"

# ------------------------------------------------------------------
# 5. PostgreSQL 特定规则 (901040-901049)
# ------------------------------------------------------------------

# [901040] PostgreSQL 特定函数
SecRule ARGS|ARGS_NAMES "@rx (?i)(pg_sleep\s*\(|pg_read_file\s*\(|pg_read_binary_file\s*\(|pg_stat|pg_settings|pg_ls_dir\s*\()" \
    "id:901040,phase:2,deny,log,msg:'SQLi: PostgreSQL Specific Function Detected',severity:'ERROR',tag:'attack-sqli'"

# [901041] PostgreSQL 系统表
SecRule ARGS|ARGS_NAMES "@rx (?i)(pg_catalog|pg_class|pg_tables|pg_namespace|pg_type)" \
    "id:901041,phase:2,deny,log,msg:'SQLi: PostgreSQL System Table Probe',severity:'ERROR',tag:'attack-sqli'"

# ------------------------------------------------------------------
# 6. SQL Server 特定规则 (901050-901059)
# ------------------------------------------------------------------

# [901050] SQL Server 特定函数
SecRule ARGS|ARGS_NAMES "@rx (?i)(xp_cmdshell|sp_executesql|exec\s*\(|sp_configure|xp_regread|xp_regwrite|sp_makewebtask)" \
    "id:901050,phase:2,deny,log,msg:'SQLi: SQL Server Specific Function Detected',severity:'ERROR',tag:'attack-sqli'"

# [901051] SQL Server 系统表
SecRule ARGS|ARGS_NAMES "@rx (?i)(sysobjects|syscolumns|sysusers|sysdatabases|sysadmin)" \
    "id:901051,phase:2,deny,log,msg:'SQLi: SQL Server System Table Probe',severity:'ERROR',tag:'attack-sqli'"

# ------------------------------------------------------------------
# 7. Oracle 特定规则 (901060-901069)
# ------------------------------------------------------------------

# [901060] Oracle 特定函数
SecRule ARGS|ARGS_NAMES "@rx (?i)(dbms_pipe|dbms_lock|utl_http|utl_tcp|utl_file|ctxsys\.drithsx\.sn|java\.net)" \
    "id:901060,phase:2,deny,log,msg:'SQLi: Oracle Specific Function Detected',severity:'ERROR',tag:'attack-sqli'"

# [901061] Oracle 系统表
SecRule ARGS|ARGS_NAMES "@rx (?i)(all_tables|all_tab_columns|all_users|dba_tables|v\$version|v\$database)" \
    "id:901061,phase:2,deny,log,msg:'SQLi: Oracle System Table Probe',severity:'ERROR',tag:'attack-sqli'"

# ------------------------------------------------------------------
# 8. NoSQL 注入 (901070-901079)
# ------------------------------------------------------------------

# [901070] MongoDB 操作符注入
SecRule ARGS|ARGS_NAMES "@rx (\$or|\$and|\$nor|\$ne|\$gt|\$gte|\$lt|\$lte|\$in|\$nin|\$all|\$exists|\$type|\$size|\$regex|\$text|\$where)" \
    "id:901070,phase:2,deny,log,msg:'NoSQLi: MongoDB Operator Injection',severity:'ERROR',tag:'attack-nosqli'"

# [901071] MongoDB 数组操作符
SecRule ARGS|ARGS_NAMES "@rx (\$push|\$addToSet|\$pop|\$pull|\$pullAll|\$rename|\$set|\$unset|\$inc|\$mul|\$min|\$max|\$currentDate)" \
    "id:901071,phase:2,deny,log,msg:'NoSQLi: MongoDB Array Operator Injection',severity:'ERROR',tag:'attack-nosqli'"

# [901072] JSON 注入
SecRule ARGS|ARGS_NAMES "@rx ({\s*\"?\$[a-zA-Z]+\"?\s*:)" \
    "id:901072,phase:2,deny,log,msg:'NoSQLi: JSON Operator Injection',severity:'ERROR',tag:'attack-nosqli'"

# [901073] MongoDB 函数注入
SecRule ARGS|ARGS_NAMES "@rx (function\s*\(|new\s+Function|return\s+)" \
    "id:901073,phase:2,deny,log,msg:'NoSQLi: MongoDB Function Injection',severity:'ERROR',tag:'attack-nosqli'"

# ------------------------------------------------------------------
# 9. SQL 盲注辅助检测 (901080-901089)
# ------------------------------------------------------------------

# [901080] 基于字符比较的盲注
SecRule ARGS|ARGS_NAMES "@rx (?i)(ascii\s*\(|substring\s*\(|substr\s*\(|mid\s*\(|left\s*\(|right\s*\(|char\s*\()" \
    "id:901080,phase:2,deny,log,msg:'SQLi: Character Comparison Blind Injection',severity:'ERROR',tag:'attack-sqli'"

# [901081] 基于位运算的盲注
SecRule ARGS|ARGS_NAMES "@rx (?i)(bin\s*\(|ord\s*\(|hex\s*\(|unhex\s*\()" \
    "id:901081,phase:2,deny,log,msg:'SQLi: Bit Operation Blind Injection',severity:'ERROR',tag:'attack-sqli'"

# [901082] 基于条件语句的盲注
SecRule ARGS|ARGS_NAMES "@rx (?i)(if\s*\(|case\s+when|decode\s*\(|coalesce\s*\()" \
    "id:901082,phase:2,deny,log,msg:'SQLi: Conditional Statement Blind Injection',severity:'ERROR',tag:'attack-sqli'"

# ------------------------------------------------------------------
# 10. SQL 注入组合检测 (901090-901099)
# ------------------------------------------------------------------

# [901090] 多阶段 SQL 注入
SecRule ARGS|ARGS_NAMES "@rx (union\s+.*select.*into|select.*\.\.\/.*passwd|@@version.*union)" \
    "id:901090,phase:2,deny,log,msg:'SQLi: Multi-stage SQL Injection Detected',severity:'ERROR',tag:'attack-sqli'"

# [901091] 报错+联合注入组合
SecRule ARGS|ARGS_NAMES "@rx (extractvalue.*union|updatexml.*union|floor.*union)" \
    "id:901091,phase:2,deny,log,msg:'SQLi: Error-based + UNION Combo Injection',severity:'ERROR',tag:'attack-sqli'"

# [901092] 二次注入模式
SecRule REQUEST_URI "@rx ([a-zA-Z0-9_]+=\s*[0-9]+.*or.*[0-9]+=[0-9]+|[a-zA-Z0-9_]+=\s*['\"].*['\"].*or.*['\"].*['\"])" \
    "id:901092,phase:2,deny,log,msg:'SQLi: Second-Order Injection Pattern',severity:'ERROR',tag:'attack-sqli'"
