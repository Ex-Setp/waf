# ============================================================
# Aegis-WAF T149 XSS Rule Pack
# ============================================================
# 覆盖：反射型 XSS、存储型 XSS、DOM XSS、mXSS
#       + 模板注入、CSP 绕过、编码绕过
# ============================================================

# ------------------------------------------------------------------
# 1. 基础 XSS 检测 (902001-902009)
# ------------------------------------------------------------------

# [902001] 脚本标签 (原有规则增强)
SecRule ARGS|ARGS_NAMES|REQUEST_URI "@rx (?i)(<\s*script[^>]*>.*?</script\s*>|<\s*script\s+)" \
    "id:902001,phase:2,deny,log,msg:'XSS: Script Tag Payload Detected',severity:'CRITICAL',tag:'attack-xss'"

# [902002] JavaScript URI 协议 (原有规则增强)
SecRule ARGS|ARGS_NAMES "@rx (?i)(javascript\s*:|vbscript\s*:|data\s*:.*(text/html|application/xhtml+xml))" \
    "id:902002,phase:2,deny,log,msg:'XSS: JavaScript URI Protocol Detected',severity:'CRITICAL',tag:'attack-xss'"

# [902003] onerror 事件处理器 (原有规则增强)
SecRule ARGS|ARGS_NAMES "@rx (?i)onerror\s*=\s*['\"]?[^'\"]*(alert|prompt|confirm|eval|window\.location)" \
    "id:902003,phase:2,deny,log,msg:'XSS: onerror Event Handler Payload',severity:'ERROR',tag:'attack-xss'"

# [902004] onload 事件处理器 (原有规则增强)
SecRule ARGS|ARGS_NAMES "@rx (?i)onload\s*=\s*['\"]?[^'\"]*(alert|prompt|confirm|eval|window\.location)" \
    "id:902004,phase:2,deny,log,msg:'XSS: onload Event Handler Payload',severity:'ERROR',tag:'attack-xss'"

# [902005] SVG 标签注入 (原有规则增强)
SecRule ARGS|ARGS_NAMES "@rx (?i)(<\s*svg[^>]*>.*?<script|<\s*svg\s+onload|<\s*svg\s+onerror)" \
    "id:902005,phase:2,deny,log,msg:'XSS: SVG Active Content Payload',severity:'ERROR',tag:'attack-xss'"

# [902006] iframe srcdoc (原有规则增强)
SecRule ARGS|ARGS_NAMES "@rx (?i)srcdoc\s*=\s*['\"][^'\"]*(script|onerror|onload|alert|javascript)" \
    "id:902006,phase:2,deny,log,msg:'XSS: iframe srcdoc Payload',severity:'ERROR',tag:'attack-xss'"

# [902007] 常用 XSS 函数调用
SecRule ARGS|ARGS_NAMES "@rx (?i)(alert\s*\(|prompt\s*\(|confirm\s*\(|console\.log\s*\()" \
    "id:902007,phase:2,deny,log,msg:'XSS: Common XSS Function Call Detected',severity:'ERROR',tag:'attack-xss'"

# [902008] 危险 DOM 属性访问
SecRule ARGS|ARGS_NAMES "@rx (?i)(document\.cookie|document\.domain|window\.location|window\.name|document\.referrer)" \
    "id:902008,phase:2,deny,log,msg:'XSS: Sensitive DOM Attribute Access',severity:'ERROR',tag:'attack-xss'"

# [902009] 空字符绕过
SecRule ARGS|ARGS_NAMES "@rx (<\s*script|<\0script|javas\0cript)" \
    "id:902009,phase:2,deny,log,msg:'XSS: Null Byte Bypass Detected',severity:'ERROR',tag:'attack-xss'"

# ------------------------------------------------------------------
# 2. 事件处理器 (902010-902019)
# ------------------------------------------------------------------

# [902010] onclick 事件
SecRule ARGS|ARGS_NAMES "@rx (?i)onclick\s*=\s*['\"]?[^'\"]*(alert|prompt|confirm|eval|window\.location)" \
    "id:902010,phase:2,deny,log,msg:'XSS: onclick Event Handler',severity:'ERROR',tag:'attack-xss'"

# [902011] onmouseover 事件
SecRule ARGS|ARGS_NAMES "@rx (?i)onmouseover\s*=\s*['\"]?[^'\"]*(alert|prompt|confirm|eval)" \
    "id:902011,phase:2,deny,log,msg:'XSS: onmouseover Event Handler',severity:'ERROR',tag:'attack-xss'"

# [902012] onfocus 事件
SecRule ARGS|ARGS_NAMES "@rx (?i)onfocus\s*=\s*['\"]?[^'\"]*(alert|prompt|confirm|eval)" \
    "id:902012,phase:2,deny,log,msg:'XSS: onfocus Event Handler',severity:'ERROR',tag:'attack-xss'"

# [902013] onblur 事件
SecRule ARGS|ARGS_NAMES "@rx (?i)onblur\s*=\s*['\"]?[^'\"]*(alert|prompt|confirm|eval)" \
    "id:902013,phase:2,deny,log,msg:'XSS: onblur Event Handler',severity:'ERROR',tag:'attack-xss'"

# [902014] onchange 事件
SecRule ARGS|ARGS_NAMES "@rx (?i)onchange\s*=\s*['\"]?[^'\"]*(alert|prompt|confirm|eval)" \
    "id:902014,phase:2,deny,log,msg:'XSS: onchange Event Handler',severity:'ERROR',tag:'attack-xss'"

# [902015] onsubmit 事件
SecRule ARGS|ARGS_NAMES "@rx (?i)onsubmit\s*=\s*['\"]?[^'\"]*(alert|prompt|confirm|eval)" \
    "id:902015,phase:2,deny,log,msg:'XSS: onsubmit Event Handler',severity:'ERROR',tag:'attack-xss'"

# [902016] 通用事件处理器模式
SecRule ARGS|ARGS_NAMES "@rx (?i)(on[a-zA-Z]+\s*=\s*['\"][^'\"]*(alert|prompt|confirm|eval|javascript))" \
    "id:902016,phase:2,deny,log,msg:'XSS: Generic Event Handler Detected',severity:'ERROR',tag:'attack-xss'"

# [902017] 事件处理器(无引号)
SecRule ARGS|ARGS_NAMES "@rx (?i)(on[a-zA-Z]+=[^'\"]*(alert|prompt|confirm|eval|window\.location)[^>]*>)" \
    "id:902017,phase:2,deny,log,msg:'XSS: Unquoted Event Handler Detected',severity:'ERROR',tag:'attack-xss'"

# ------------------------------------------------------------------
# 3. 危险 HTML 标签 (902020-902029)
# ------------------------------------------------------------------

# [902020] iframe 标签注入
SecRule ARGS|ARGS_NAMES "@rx (?i)(<\s*iframe[^>]*(src|srcdoc)\s*=\s*['\"]?(javascript|data:))" \
    "id:902020,phase:2,deny,log,msg:'XSS: iframe Tag Injection',severity:'ERROR',tag:'attack-xss'"

# [902021] object/embed/applet 标签
SecRule ARGS|ARGS_NAMES "@rx (?i)(<\s*(object|embed|applet)[^>]*>)" \
    "id:902021,phase:2,deny,log,msg:'XSS: object/embed/applet Tag Injection',severity:'ERROR',tag:'attack-xss'"

# [902022] img 标签注入
SecRule ARGS|ARGS_NAMES "@rx (?i)(<\s*img[^>]*onerror\s*=|<\s*img[^>]*src\s*=\s*['\"]?javascript:)" \
    "id:902022,phase:2,deny,log,msg:'XSS: img Tag Injection',severity:'ERROR',tag:'attack-xss'"

# [902023] meta/link 标签注入
SecRule ARGS|ARGS_NAMES "@rx (?i)(<\s*meta[^>]*http-equiv\s*=\s*['\"]?refresh|<\s*link[^>]*href\s*=\s*['\"]?javascript:)" \
    "id:902023,phase:2,deny,log,msg:'XSS: meta/link Tag Injection',severity:'ERROR',tag:'attack-xss'"

# [902024] base 标签注入
SecRule ARGS|ARGS_NAMES "@rx (?i)(<\s*base\s+href\s*=\s*['\"]?javascript:)" \
    "id:902024,phase:2,deny,log,msg:'XSS: base Tag Injection',severity:'ERROR',tag:'attack-xss'"

# [902025] style 标签注入
SecRule ARGS|ARGS_NAMES "@rx (?i)(<\s*style[^>]*>.*(expression|behavior|binding).*</style\s*>)" \
    "id:902025,phase:2,deny,log,msg:'XSS: style Tag Injection (IE CSS Exploit)',severity:'ERROR',tag:'attack-xss'"

# [902026] form 标签注入
SecRule ARGS|ARGS_NAMES "@rx (?i)(<\s*form[^>]*action\s*=\s*['\"]?javascript:)" \
    "id:902026,phase:2,deny,log,msg:'XSS: form Tag Injection',severity:'ERROR',tag:'attack-xss'"

# ------------------------------------------------------------------
# 4. DOM XSS (902030-902039)
# ------------------------------------------------------------------

# [902030] document.write 注入
SecRule ARGS|ARGS_NAMES "@rx (?i)(document\.(write|writeln|writeIn)\s*\()" \
    "id:902030,phase:2,deny,log,msg:'XSS: document.write Injection',severity:'ERROR',tag:'attack-xss-dom'"

# [902031] innerHTML/outerHTML 注入
SecRule ARGS|ARGS_NAMES "@rx (?i)((inner|outer)HTML\s*=\s*['\"]?[^'\"]*(<script|onerror|onload))" \
    "id:902031,phase:2,deny,log,msg:'XSS: innerHTML/outerHTML Injection',severity:'ERROR',tag:'attack-xss-dom'"

# [902032] insertAdjacentHTML 注入
SecRule ARGS|ARGS_NAMES "@rx (?i)(insertAdjacentHTML\s*\()" \
    "id:902032,phase:2,deny,log,msg:'XSS: insertAdjacentHTML Injection',severity:'ERROR',tag:'attack-xss-dom'"

# [902033] createElement 注入
SecRule ARGS|ARGS_NAMES "@rx (?i)createElement\s*\(['\"]?(script|iframe|object|embed)" \
    "id:902033,phase:2,deny,log,msg:'XSS: createElement Injection',severity:'ERROR',tag:'attack-xss-dom'"

# [902034] eval/setTimeout/setInterval 注入
SecRule ARGS|ARGS_NAMES "@rx (?i)(eval\s*\(|setTimeout\s*\(['\"][^'\"]*(alert|prompt|confirm|location)|setInterval\s*\()" \
    "id:902034,phase:2,deny,log,msg:'XSS: eval/setTimeout/setInterval Injection',severity:'ERROR',tag:'attack-xss-dom'"

# [902035] location 跳转注入
SecRule ARGS|ARGS_NAMES "@rx (?i)((window\.)?location\s*=\s*['\"]?(javascript:))" \
    "id:902035,phase:2,deny,log,msg:'XSS: location Redirection Injection',severity:'ERROR',tag:'attack-xss-dom'"

# [902036] Function 构造函数注入
SecRule ARGS|ARGS_NAMES "@rx (?i)(Function\s*\(['\"][^'\"]*(alert|prompt|confirm|eval|location))" \
    "id:902036,phase:2,deny,log,msg:'XSS: Function Constructor Injection',severity:'ERROR',tag:'attack-xss-dom'"

# ------------------------------------------------------------------
# 5. 模板注入 / Angular / Vue (902040-902049)
# ------------------------------------------------------------------

# [902040] Angular 模板注入
SecRule ARGS|ARGS_NAMES "@rx (\{\{[^}]*\s+[a-zA-Z]+\s*[|:]\s*[^}]+\}\})" \
    "id:902040,phase:2,deny,log,msg:'XSS: Angular Template Injection',severity:'ERROR',tag:'attack-xss-template'"

# [902041] Angular 沙盒逃逸
SecRule ARGS|ARGS_NAMES "@rx (\{\{.*constructor.*\}\}|\{\{.*__proto__.*\}\}|\{\{.*prototype.*\}\})" \
    "id:902041,phase:2,deny,log,msg:'XSS: Angular Sandbox Escape',severity:'ERROR',tag:'attack-xss-template'"

# [902042] Vue 模板注入
SecRule ARGS|ARGS_NAMES "@rx (v-html\s*=|v-bind\s*=|{{[^}]*v-)" \
    "id:902042,phase:2,deny,log,msg:'XSS: Vue Template Injection',severity:'ERROR',tag:'attack-xss-template'"

# [902043] React JSX 注入
SecRule ARGS|ARGS_NAMES "@rx (dangerouslySetInnerHTML\s*=|__html\s*:)" \
    "id:902043,phase:2,deny,log,msg:'XSS: React JSX Injection',severity:'ERROR',tag:'attack-xss-template'"

# ------------------------------------------------------------------
# 6. CSP 绕过 (902050-902059)
# ------------------------------------------------------------------

# [902050] url() 函数绕过
SecRule ARGS|ARGS_NAMES "@rx (?i)url\s*\(['\"]?\s*(javascript|data)" \
    "id:902050,phase:2,deny,log,msg:'XSS: url() Function CSP Bypass',severity:'ERROR',tag:'attack-xss-csp'"

# [902051] 数据 URI 绕过
SecRule ARGS|ARGS_NAMES "@rx (?i)data\s*:\s*(text/html|image/svg\+xml)\s*;base64" \
    "id:902051,phase:2,deny,log,msg:'XSS: Data URI CSP Bypass',severity:'ERROR',tag:'attack-xss-csp'"

# [902052] JSONP 回调绕过
SecRule ARGS|ARGS_NAMES "@rx (callback|jsonp)\s*=\s*[^&]*(alert|prompt|confirm|eval)" \
    "id:902052,phase:2,deny,log,msg:'XSS: JSONP Callback CSP Bypass',severity:'ERROR',tag:'attack-xss-csp'"

# ------------------------------------------------------------------
# 7. 编码/混淆绕过 (902060-902069)
# ------------------------------------------------------------------

# [902060] HTML 实体编码
SecRule ARGS|ARGS_NAMES "@rx (&lt;\s*script|&lt;\s*img|&lt;\s*iframe|&#\d+;)" \
    "id:902060,phase:2,deny,log,msg:'XSS: HTML Entity Encoded Payload',severity:'ERROR',tag:'attack-xss-encode'"

# [902061] URL 编码绕过
SecRule ARGS|ARGS_NAMES "@rx (%3Cscript|%3Cimg|%3Ciframe|%3Csvg|%3Cobject|%3Cembed)" \
    "id:902061,phase:2,deny,log,msg:'XSS: URL Encoded Payload',severity:'ERROR',tag:'attack-xss-encode'"

# [902062] 双重 URL 编码
SecRule ARGS|ARGS_NAMES "@rx (%253Cscript|%253Cimg|%253Ciframe|%253Csvg)" \
    "id:902062,phase:2,deny,log,msg:'XSS: Double URL Encoded Payload',severity:'ERROR',tag:'attack-xss-encode'"

# [902063] Unicode 编码绕过
SecRule ARGS|ARGS_NAMES "@rx (\\\\u[0-9a-f]{4}|%u[0-9a-f]{4})" \
    "id:902063,phase:2,deny,log,msg:'XSS: Unicode Encoded Payload',severity:'ERROR',tag:'attack-xss-encode'"

# [902064] 十六进制编码
SecRule ARGS|ARGS_NAMES "@rx (&#x[0-9a-f]{2,6};)" \
    "id:902064,phase:2,deny,log,msg:'XSS: Hex Encoded Payload',severity:'ERROR',tag:'attack-xss-encode'"

# [902065] 空白字符混淆
SecRule ARGS|ARGS_NAMES "@rx (<\s*[sS]\s*[cC]\s*[rR]\s*[iI]\s*[pP]\s*[tT])" \
    "id:902065,phase:2,deny,log,msg:'XSS: Whitespace Obfuscation',severity:'ERROR',tag:'attack-xss-encode'"

# [902066] 大小写混淆
SecRule ARGS|ARGS_NAMES "@rx (?i)(<\s*[sS][cC][rR][iI][pP][tT]|<\s*[iI][mM][gG]|<\s*[iI][fF][rR][aA][mM][eE])" \
    "id:902066,phase:2,deny,log,msg:'XSS: Case Obfuscation Detected',severity:'ERROR',tag:'attack-xss-encode'"

# ------------------------------------------------------------------
# 8. mXSS (突变 XSS) (902070-902079)
# ------------------------------------------------------------------

# [902070] 注释突变
SecRule ARGS|ARGS_NAMES "@rx (<!--\s*<script>|<!--\s*<img|-->\s*<script>)" \
    "id:902070,phase:2,deny,log,msg:'XSS: Mutation via Comment Tags',severity:'ERROR',tag:'attack-xss-mutation'"

# [902071] 属性突变
SecRule ARGS|ARGS_NAMES "@rx (on[a-zA-Z]+\s*=\s*[>\s]*[^>\s]+[>\s]*[^>]*(alert|prompt|confirm|eval))" \
    "id:902071,phase:2,deny,log,msg:'XSS: Mutation via Attribute Injection',severity:'ERROR',tag:'attack-xss-mutation'"

# [902072] 标签闭合突变
SecRule ARGS|ARGS_NAMES "@rx (</?[a-zA-Z]+>\s*<script|</?[a-zA-Z]+>\s*<img)" \
    "id:902072,phase:2,deny,log,msg:'XSS: Mutation via Tag Closure',severity:'ERROR',tag:'attack-xss-mutation'"

# [902073] CSS expression 注入
SecRule ARGS|ARGS_NAMES "@rx (?i)(expression\s*\(|behavior\s*:|binding\s*:)" \
    "id:902073,phase:2,deny,log,msg:'XSS: CSS expression Injection (IE)',severity:'ERROR',tag:'attack-xss-mutation'"

# ------------------------------------------------------------------
# 9. 存储型 XSS 特征 (902080-902089)
# ------------------------------------------------------------------

# [902080] 持久化注入模式
SecRule REQUEST_BODY|ARGS "@rx (<[^>]*>.*<[^>]*>|javascript:.*\<\w+\>)" \
    "id:902080,phase:2,deny,log,msg:'XSS: Persistent Injection Pattern',severity:'INFO',tag:'attack-xss-stored'"

# [902081] 评论/富文本注入
SecRule ARGS|ARGS_NAMES "@rx (?i)(<!--[^>]*--><script>|\[img\][^<]*<script>|<[^>]+>.*<script>)" \
    "id:902081,phase:2,deny,log,msg:'XSS: Comment/Rich Text Injection',severity:'ERROR',tag:'attack-xss-stored'"

# [902082] 多个嵌套标签
SecRule ARGS|ARGS_NAMES "@rx (<[a-z]+>[^<]*<[a-z]+>[^<]*<[a-z]+>)" \
    "id:902082,phase:2,deny,log,msg:'XSS: Multiple Nested Tags Detected',severity:'ERROR',tag:'attack-xss-stored'"

# ------------------------------------------------------------------
# 10. 高级/组合 XSS (902090-902099)
# ------------------------------------------------------------------

# [902090] 多阶段 XSS 绕过
SecRule ARGS|ARGS_NAMES "@rx (alert.*\s*\+\s*['\"]?[^'\"]*['\"]?|prompt.*\s*\+\s*['\"]?[^'\"]*['\"]?)" \
    "id:902090,phase:2,deny,log,msg:'XSS: Multi-stage Payload Detected',severity:'ERROR',tag:'attack-xss-advanced'"

# [902091] 编码混合绕过
SecRule ARGS|ARGS_NAMES "@rx (%[0-9a-f]{2}[a-z]+(alert|prompt|confirm)|&lt;.*&gt;.*\()" \
    "id:902091,phase:2,deny,log,msg:'XSS: Mixed Encoding Bypass',severity:'ERROR',tag:'attack-xss-advanced'"

# [902092] 反射型 XSS 模式
SecRule ARGS|ARGS_NAMES "@rx (=\s*['\"]?[^'\"]*<script|=\s*['\"]?[^'\"]*javascript:)" \
    "id:902092,phase:2,deny,log,msg:'XSS: Reflected Injection Pattern',severity:'ERROR',tag:'attack-xss-reflected'"

# [902093] 自 XSS 模式
SecRule ARGS|ARGS_NAMES "@rx (console\.log\s*\(.*['\"][^'\"]*['\"]|document\.cookie.*alert)" \
    "id:902093,phase:2,deny,log,msg:'XSS: Self-XSS Pattern Detected',severity:'ERROR',tag:'attack-xss-advanced'"
