# 12. 特殊漏洞 (903110-903119)
# ------------------------------------------------------------------

# [903110] CVE-2021-44228 Log4Shell (增强)
SecRule ARGS|ARGS_NAMES|REQUEST_HEADERS "@rx (\$\{jndi:(ldap|rmi|dns|http|https|iiop|nis|nds):[^}]*\})" \
    "id:903110,phase:2,deny,log,msg:'RCE: Log4Shell JNDI Exploit',severity:'ERROR',tag:'attack-rce',tag:'cve-2021-44228'"

# [903111] CVE-2017-5638 Struts2 Content-Type RCE
SecRule REQUEST_HEADERS:Content-Type "@rx (%\{[^}]*\}|#\{[^}]*\})" \
    "id:903111,phase:1,deny,log,msg:'RCE: Struts2 Content-Type Exploit',severity:'CRITICAL',tag:'attack-rce',tag:'cve-2017-5638'"

# [903112] CVE-2019-0232 Tomcat CGI RCE
SecRule REQUEST_URI "@rx (%00|%0d%0a)" \
    "id:903112,phase:2,deny,log,msg:'RCE: Tomcat CGI RCE Probe',severity:'ERROR',tag:'attack-rce',tag:'cve-2019-0232'"

# [903113] Spring4Shell CVE-2022-22965
SecRule ARGS|ARGS_NAMES|REQUEST_HEADERS "@rx (class\.module\.|class\.loader\.|class\.protectionDomain|class\.java\.)" \
    "id:903113,phase:2,deny,log,msg:'RCE: Spring4Shell Exploit Probe',severity:'ERROR',tag:'attack-rce',tag:'cve-2022-22965'"
