# Aegis-WAF T149 RCE, command injection, SSTI, LDAP and XPath rule pack.
SecRule ARGS "@contains ;cat /etc/passwd" "id:903001,phase:2,deny,log,msg:'RCE command chaining reads passwd',severity:'CRITICAL',tag:'aegis-category-rce',tag:'attack-rce'"
SecRule ARGS "@contains |id" "id:903002,phase:2,deny,log,msg:'RCE pipe to id command',severity:'CRITICAL',tag:'aegis-category-rce',tag:'attack-rce'"
SecRule ARGS "@contains $(whoami)" "id:903003,phase:2,deny,log,msg:'RCE shell command substitution',severity:'CRITICAL',tag:'aegis-category-rce',tag:'attack-rce'"
SecRule ARGS "@contains ${jndi:" "id:903004,phase:2,deny,log,msg:'Log4Shell JNDI lookup probe',severity:'CRITICAL',tag:'aegis-category-rce',tag:'attack-rce',tag:'cve-probe'"
SecRule ARGS "@contains {{7*7}}" "id:903005,phase:2,deny,log,msg:'SSTI arithmetic expression probe',severity:'CRITICAL',tag:'aegis-category-rce',tag:'attack-ssti'"
SecRule ARGS "@contains and exec(" "id:903006,phase:2,deny,log,msg:'LDAP or XPath injection executable expression',severity:'WARNING',tag:'aegis-category-rce',tag:'attack-injection'"
