# ============================================================
# Aegis-WAF T149 RCE, Command Injection, SSTI, LDAP, XPath
# ============================================================
# 覆盖：命令注入、代码执行、模板注入(SSTI)、
#       LDAP注入、XPath注入、表达式注入(EL/OGNL)
# ============================================================

# ------------------------------------------------------------------
# 1. 命令注入 - 基础命令链 (903001-903009)
# ------------------------------------------------------------------

# [903001] 命令链: ; 分隔符 + 敏感命令 (原有规则增强)
SecRule ARGS|ARGS_NAMES "@rx (?i)(;\s*(cat|curl|wget|nc|bash|sh|python|perl|ruby|php|awk|sed|grep|find|xargs|chmod|chown|kill|pkill|systemctl)\s+)" \
    "id:903001,phase:2,deny,log,msg:'RCE: Command Chaining with Semicolon',severity:'ERROR',tag:'attack-rce'"

# [903002] 管道执行: | 命令 (原有规则增强)
SecRule ARGS|ARGS_NAMES "@rx (?i)\|\s*(cat|curl|wget|nc|bash|sh|python|perl|ruby|php|id|whoami|uname|ls|dir|echo|pwd|ps|netstat|ifconfig|ipconfig|ping|nslookup|dig|nmap|traceroute|route|arp)" \
    "id:903002,phase:2,deny,log,msg:'RCE: Pipe Command Execution',severity:'ERROR',tag:'attack-rce'"

# [903003] 命令替换: $(...) 和 `...` (原有规则增强)
SecRule ARGS|ARGS_NAMES "@rx (?i)(\$\([^)]*(cat|curl|wget|nc|bash|sh|python|perl|ruby|php|id|whoami|uname|ls|echo|pwd)\s+|`\s*(cat|curl|wget|nc|bash|sh|python|perl|ruby|php)\s+)" \
    "id:903003,phase:2,deny,log,msg:'RCE: Command Substitution Detected',severity:'ERROR',tag:'attack-rce'"

# [903004] Log4Shell JNDI 注入 (原有规则增强)
SecRule ARGS|ARGS_NAMES|REQUEST_HEADERS "@rx (\$\{jndi:(ldap|rmi|dns|http|https|iiop):)" \
    "id:903004,phase:2,deny,log,msg:'RCE: Log4Shell JNDI Lookup Probe',severity:'ERROR',tag:'attack-rce',tag:'cve-probe'"

# [903005] 重定向输出到文件
SecRule ARGS|ARGS_NAMES "@rx (?i)(>\s*/dev/(null|tcp|udp)|>\s*/tmp/|>\s*/var/|>\s*/etc/|>\s*C:\\\\)" \
    "id:903005,phase:2,deny,log,msg:'RCE: Output Redirection to Sensitive Location',severity:'ERROR',tag:'attack-rce'"

# [903006] 敏感文件读取
SecRule ARGS|ARGS_NAMES "@rx (?i)(cat\s+/etc/(passwd|shadow|group|hosts|fstab|issue|release|sudoers|ssh/)|cat\s+/proc/self/environ|cat\s+/var/log/|type\s+C:\\\\(Windows|WINNT)\\\\)" \
    "id:903006,phase:2,deny,log,msg:'RCE: Sensitive File Read Detected',severity:'ERROR',tag:'attack-rce'"

# [903007] 命令链: & 和 && 分隔符
SecRule ARGS|ARGS_NAMES "@rx (?i)(&\s*(cat|curl|wget|nc|bash|sh|python|perl|ruby|php|id|whoami)\s+|&&\s*(cat|curl|wget|nc|bash|sh|python|perl|ruby|php|id|whoami)\s+)" \
    "id:903007,phase:2,deny,log,msg:'RCE: Command Chaining with &/&&',severity:'ERROR',tag:'attack-rce'"

# [903008] 新行分隔符命令注入
SecRule ARGS|ARGS_NAMES "@rx (%0a|%0d)(cat|curl|wget|nc|bash|sh|python|perl|ruby|php|id|whoami|uname|ls|echo|pwd)" \
    "id:903008,phase:2,deny,log,msg:'RCE: Newline Command Injection',severity:'ERROR',tag:'attack-rce'"

# [903009] 环境变量命令执行
SecRule ARGS|ARGS_NAMES "@rx (?i)(export\s+[A-Z_]+=.*;|env\s+[A-Z_]+=.*\s+)|(\${ENV}|${PATH}|${IFS}|${SHELL})" \
    "id:903009,phase:2,deny,log,msg:'RCE: Environment Variable Command Execution',severity:'ERROR',tag:'attack-rce'"

# ------------------------------------------------------------------
# 2. 命令注入 - 编码/绕过 (903010-903019)
# ------------------------------------------------------------------

# [903010] URL 编码命令注入
SecRule ARGS|ARGS_NAMES "@rx (%0A|%0D|%3B|%7C|%26)(cat|curl|wget|nc|bash|sh|python|perl|ruby|php|id|whoami)" \
    "id:903010,phase:2,deny,log,msg:'RCE: URL Encoded Command Injection',severity:'ERROR',tag:'attack-rce'"

# [903011] 反斜杠绕过
SecRule ARGS|ARGS_NAMES "@rx (c\\at|c\\u\\r\\l|w\\g\\e\\t|n\\c|b\\a\\s\\h|s\\h|p\\y\\t\\h\\o\\n|p\\e\\r\\l|r\\u\\b\\y)" \
    "id:903011,phase:2,deny,log,msg:'RCE: Backslash Bypass Detected',severity:'ERROR',tag:'attack-rce'"

# [903012] 通配符命令执行
SecRule ARGS|ARGS_NAMES "@rx (?i)(/\*[^/]*\*/.*|rm\s+-rf\s+/\s*|mv\s+/\s*|cp\s+/\s*)" \
    "id:903012,phase:2,deny,log,msg:'RCE: Wildcard Command Execution',severity:'ERROR',tag:'attack-rce'"

# [903013] 内联命令执行
SecRule ARGS|ARGS_NAMES "@rx (?i)(`[^`]*(cat|curl|wget|nc|bash|sh|python|perl|ruby|php|id|whoami)[^`]*`)" \
    "id:903013,phase:2,deny,log,msg:'RCE: Inline Command Execution',severity:'ERROR',tag:'attack-rce'"

# ------------------------------------------------------------------
# 3. PHP 代码执行 (903020-903029)
# ------------------------------------------------------------------

# [903020] PHP 代码执行函数
SecRule ARGS|ARGS_NAMES "@rx (?i)(eval\s*\(|assert\s*\(|system\s*\(|exec\s*\(|passthru\s*\(|shell_exec\s*\(|popen\s*\(|proc_open\s*\(|pcntl_exec\s*\()" \
    "id:903020,phase:2,deny,log,msg:'RCE: PHP Code Execution Function',severity:'ERROR',tag:'attack-rce-php'"

# [903021] PHP 文件包含
SecRule ARGS|ARGS_NAMES "@rx (?i)(include\s*\(|include_once\s*\(|require\s*\(|require_once\s*\()" \
    "id:903021,phase:2,deny,log,msg:'RCE: PHP File Inclusion',severity:'ERROR',tag:'attack-rce-php'"

# [903022] PHP 动态函数调用
SecRule ARGS|ARGS_NAMES "@rx (?i)(\$_[A-Z]+\[\s*['\"][^'\"]*['\"]\s*\]\s*\(|call_user_func\s*\(|create_function\s*\()" \
    "id:903022,phase:2,deny,log,msg:'RCE: PHP Dynamic Function Call',severity:'ERROR',tag:'attack-rce-php'"

# [903023] PHP 反序列化
SecRule ARGS|ARGS_NAMES "@rx (?i)(unserialize\s*\(|session_decode\s*\()" \
    "id:903023,phase:2,deny,log,msg:'RCE: PHP Deserialization',severity:'ERROR',tag:'attack-rce-php'"

# [903024] PHP <?= 短标签
SecRule ARGS|ARGS_NAMES "@rx (<\?=|<\%\s*=|<\?php\s*(system|exec|eval|passthru|shell_exec))" \
    "id:903024,phase:2,deny,log,msg:'RCE: PHP Short Tag Code Execution',severity:'ERROR',tag:'attack-rce-php'"

# ------------------------------------------------------------------
# 4. Java/JSP 代码执行 (903030-903039)
# ------------------------------------------------------------------

# [903030] Java Runtime.exec 执行
SecRule ARGS|ARGS_NAMES "@rx (?i)(Runtime\.getRuntime\s*\(\)\.exec\s*\(|new\s+ProcessBuilder\s*\()" \
    "id:903030,phase:2,deny,log,msg:'RCE: Java Runtime.exec Execution',severity:'ERROR',tag:'attack-rce-java'"

# [903031] Java 反射调用
SecRule ARGS|ARGS_NAMES "@rx (?i)(Class\.forName\s*\(|Method\.invoke\s*\(|Constructor\.newInstance\s*\()" \
    "id:903031,phase:2,deny,log,msg:'RCE: Java Reflection Invocation',severity:'ERROR',tag:'attack-rce-java'"

# [903032] JSP 脚本片段
SecRule ARGS|ARGS_NAMES "@rx (<%[^>]*(Runtime|ProcessBuilder|exec|getRuntime)[^>]*%>)" \
    "id:903032,phase:2,deny,log,msg:'RCE: JSP Scriptlet Code Execution',severity:'ERROR',tag:'attack-rce-java'"

# [903033] Java 反序列化
SecRule ARGS|ARGS_NAMES "@rx (?i)(ObjectInputStream|readObject\s*\(|deserialize\s*\()" \
    "id:903033,phase:2,deny,log,msg:'RCE: Java Deserialization',severity:'ERROR',tag:'attack-rce-java'"

# ------------------------------------------------------------------
# 5. ASP/.NET 代码执行 (903040-903049)
# ------------------------------------------------------------------

# [903040] ASP 代码执行
SecRule ARGS|ARGS_NAMES "@rx (CreateObject\s*\(['\"]?Shell\.Application|CreateObject\s*\(['\"]?WScript\.Shell|CreateObject\s*\(['\"]?Scripting\.FileSystemObject)" \
    "id:903040,phase:2,deny,log,msg:'RCE: ASP/COM Object Creation',severity:'ERROR',tag:'attack-rce-asp'"

# [903041] .NET Process.Start
SecRule ARGS|ARGS_NAMES "@rx (?i)(Process\.Start\s*\(|System\.Diagnostics\.Process)" \
    "id:903041,phase:2,deny,log,msg:'RCE: .NET Process.Start Execution',severity:'ERROR',tag:'attack-rce-asp'"

# [903042] ASPX 代码块
SecRule ARGS|ARGS_NAMES "@rx (<%\s*[^>]*(Process|Shell|CreateObject|Response\.Write)[^>]*%>)" \
    "id:903042,phase:2,deny,log,msg:'RCE: ASPX Code Block Execution',severity:'ERROR',tag:'attack-rce-asp'"

# ------------------------------------------------------------------
# 6. Python/Node.js 代码执行 (903050-903059)
# ------------------------------------------------------------------

# [903050] Python 代码执行
SecRule ARGS|ARGS_NAMES "@rx (?i)(eval\s*\([^)]*['\"].*['\"].*\)|exec\s*\([^)]*['\"].*['\"].*\)|__import__\s*\(|os\.system\s*\(|subprocess\.(call|Popen|check_output)\s*\()" \
    "id:903050,phase:2,deny,log,msg:'RCE: Python Code Execution',severity:'ERROR',tag:'attack-rce-python'"

# [903051] Node.js 代码执行
SecRule ARGS|ARGS_NAMES "@rx (?i)(child_process\.(exec|execSync|spawn|fork)\s*\(|require\s*\(['\"]child_process['\"]\)|eval\s*\(|vm\.runInNewContext\s*\()" \
    "id:903051,phase:2,deny,log,msg:'RCE: Node.js Code Execution',severity:'ERROR',tag:'attack-rce-node'"

# ------------------------------------------------------------------
# 7. 表达式注入 (EL/OGNL/MVEL) (903060-903069)
# ------------------------------------------------------------------

# [903060] EL 表达式注入
SecRule ARGS|ARGS_NAMES "@rx (\$\{[^}]*(Runtime|getRuntime|exec|ProcessBuilder|class\.forName)[^}]*\})" \
    "id:903060,phase:2,deny,log,msg:'RCE: EL Expression Injection',severity:'CRITICAL',tag:'attack-rce-el'"

# [903061] OGNL 表达式注入
SecRule ARGS|ARGS_NAMES "@rx (\#\{\s*[^}]*(Runtime|getRuntime|exec|ProcessBuilder)[^}]*\})" \
    "id:903061,phase:2,deny,log,msg:'RCE: OGNL Expression Injection',severity:'ERROR',tag:'attack-rce-ognl'"

# [903062] MVEL 表达式注入
SecRule ARGS|ARGS_NAMES "@rx (org\.mvel|MVEL\.eval\s*\()" \
    "id:903062,phase:2,deny,log,msg:'RCE: MVEL Expression Injection',severity:'ERROR',tag:'attack-rce-mvel'"

# [903063] Spring SpEL 注入
SecRule ARGS|ARGS_NAMES "@rx (\#\{[^}]*(T\s*\(|new\s+ProcessBuilder|Runtime\.getRuntime)[^}]*\})" \
    "id:903063,phase:2,deny,log,msg:'RCE: Spring SpEL Injection',severity:'ERROR',tag:'attack-rce-spel'"

# [903064] JSP EL 注入
SecRule ARGS|ARGS_NAMES "@rx (\$\{[^}]*(pageContext|request\.getParameter|session\.getAttribute)[^}]*\})" \
    "id:903064,phase:2,deny,log,msg:'RCE: JSP EL Injection',severity:'ERROR',tag:'attack-rce-el'"

# ------------------------------------------------------------------
# 8. SSTI (服务器端模板注入) (903070-903079)
# ------------------------------------------------------------------

# [903070] Jinja2/Flask SSTI (原有规则增强)
SecRule ARGS|ARGS_NAMES "@rx (\{\{[^}]*(self|__class__|__mro__|__subclasses__|__builtins__|config|request\.application)[^}]*\}\})" \
    "id:903070,phase:2,deny,log,msg:'SSTI: Jinja2/Flask Template Injection',severity:'CRITICAL',tag:'attack-ssti'"

# [903071] Freemarker SSTI
SecRule ARGS|ARGS_NAMES "@rx (\$\{[^}]*((\.w?)?api|\.exec|\.new|\.getClass|\.forName|\.getRuntime)[^}]*\})" \
    "id:903071,phase:2,deny,log,msg:'SSTI: Freemarker Template Injection',severity:'ERROR',tag:'attack-ssti'"

# [903072] Velocity SSTI
SecRule ARGS|ARGS_NAMES "@rx (#set\s*\([^)]*\$[^)]*(getClass|forName|Runtime|exec)[^)]*\))" \
    "id:903072,phase:2,deny,log,msg:'SSTI: Velocity Template Injection',severity:'ERROR',tag:'attack-ssti'"

# [903073] Twig/PHP SSTI
SecRule ARGS|ARGS_NAMES "@rx (\{\{[^}]*(_self\.env|_self\.|_context\.|_charset|_self\.registerUndefinedFilterCallback|_self\.getFilter)[^}]*\}\})" \
    "id:903073,phase:2,deny,log,msg:'SSTI: Twig/PHP Template Injection',severity:'ERROR',tag:'attack-ssti'"

# [903074] Go Template SSTI
SecRule ARGS|ARGS_NAMES "@rx (\{\{[^}]*(\.|\$)[^}]*(printf|println|index|len|slice)[^}]*\}\})" \
    "id:903074,phase:2,deny,log,msg:'SSTI: Go Template Injection',severity:'ERROR',tag:'attack-ssti'"

# [903075] 算术表达式 SSTI (原有规则增强)
SecRule ARGS|ARGS_NAMES "@rx (\{\{[^}]*[0-9]+\s*[\+\-\*\/]\s*[0-9]+[^}]*\}\})" \
    "id:903075,phase:2,deny,log,msg:'SSTI: Arithmetic Expression Probe',severity:'ERROR',tag:'attack-ssti'"

# [903076] 模板注入: 调试/配置文件访问
SecRule ARGS|ARGS_NAMES "@rx (\{\{[^}]*(config|settings|DEBUG|SECRET_KEY|env|ENV)[^}]*\}\})" \
    "id:903076,phase:2,deny,log,msg:'SSTI: Config/Debug Access Probe',severity:'ERROR',tag:'attack-ssti'"

# ------------------------------------------------------------------
# 9. LDAP 注入 (903080-903089)
# ------------------------------------------------------------------

# [903080] LDAP 基础注入 (原有规则增强)
SecRule ARGS|ARGS_NAMES "@rx (?i)(\*\(|\)\s*\(|&\s*\(|\|\s*\(|\([^)]*\)\s*\([^)]*\))" \
    "id:903080,phase:2,deny,log,msg:'LDAP: Query Injection Detected',severity:'ERROR',tag:'attack-ldap'"

# [903081] LDAP 逻辑注入
SecRule ARGS|ARGS_NAMES "@rx (?i)(\|\s*\([^)]*\)\s*\([^)]*\)|&\s*\([^)]*\)\s*\([^)]*\))" \
    "id:903081,phase:2,deny,log,msg:'LDAP: Logical Operator Injection',severity:'ERROR',tag:'attack-ldap'"

# [903082] LDAP 空字节注入
SecRule ARGS|ARGS_NAMES "@rx (%00)" \
    "id:903082,phase:2,deny,log,msg:'LDAP: Null Byte Injection',severity:'ERROR',tag:'attack-ldap'"

# [903083] LDAP 通配符注入
SecRule ARGS|ARGS_NAMES "@rx (\*[^)]*\*\s*\))" \
    "id:903083,phase:2,deny,log,msg:'LDAP: Wildcard Injection',severity:'ERROR',tag:'attack-ldap'"

# ------------------------------------------------------------------
# 10. XPath 注入 (903090-903099)
# ------------------------------------------------------------------

# [903090] XPath 基础注入 (原有规则增强)
SecRule ARGS|ARGS_NAMES "@rx (?i)((and|or|not)\s+[a-zA-Z]+\s*=\s*[a-zA-Z]+|'[^']*'\s*=\s*'[^']*')" \
    "id:903090,phase:2,deny,log,msg:'XPath: Boolean Injection Detected',severity:'ERROR',tag:'attack-xpath'"

# [903091] XPath 逻辑注入
SecRule ARGS|ARGS_NAMES "@rx (or\s+1=1|or\s+1=0|and\s+1=1|and\s+1=0)" \
    "id:903091,phase:2,deny,log,msg:'XPath: Tautology Injection Detected',severity:'ERROR',tag:'attack-xpath'"

# [903092] XPath 路径注入
SecRule ARGS|ARGS_NAMES "@rx (/[a-zA-Z0-9_]+/.+/|/[^/]*/\*)" \
    "id:903092,phase:2,deny,log,msg:'XPath: Path Injection Detected',severity:'ERROR',tag:'attack-xpath'"

# [903093] XPath 注释注入
SecRule ARGS|ARGS_NAMES "@rx (<!--|-->)" \
    "id:903093,phase:2,deny,log,msg:'XPath: Comment Injection Detected',severity:'ERROR',tag:'attack-xpath'"

# ------------------------------------------------------------------
# 11. 反序列化漏洞 (903100-903109)
# ------------------------------------------------------------------

# [903100] 通用反序列化
SecRule ARGS|ARGS_NAMES "@rx (?i)(unserialize|deserialize|readObject|readResolve|readExternal)\s*\(" \
    "id:903100,phase:2,deny,log,msg:'RCE: Deserialization Function Detected',severity:'ERROR',tag:'attack-deserialize'"

# [903101] Java 反序列化 gadget
SecRule ARGS|ARGS_NAMES "@rx (CommonsCollections|SpringAbstractBeanFactoryPointcutAdvisor|JdbcRowSetImpl|BeanShell|Clojure|Groovy|Hibernate|JBoss|Jython|MVEL|OGNL|Rome|XStream)" \
    "id:903101,phase:2,deny,log,msg:'RCE: Java Deserialization Gadget Detected',severity:'ERROR',tag:'attack-deserialize'"

# [903102] PHP 反序列化 gadget
SecRule ARGS|ARGS_NAMES "@rx (O:\d+:\"|s:\d+:\"|C:\d+:\"|R:\d+;|a:\d+:{|b:\d+;)" \
    "id:903102,phase:2,deny,log,msg:'RCE: PHP Deserialization Payload',severity:'ERROR',tag:'attack-deserialize'"

