# Aegis-WAF T149 SSRF rule pack.
SecRule ARGS "@contains 169.254.169.254" "id:905001,phase:2,deny,log,msg:'SSRF cloud metadata endpoint probe',severity:'CRITICAL',tag:'aegis-category-ssrf',tag:'attack-ssrf'"
SecRule ARGS "@contains metadata.google.internal" "id:905002,phase:2,deny,log,msg:'SSRF Google metadata endpoint probe',severity:'CRITICAL',tag:'aegis-category-ssrf',tag:'attack-ssrf'"
SecRule ARGS "@contains http://127.0.0.1" "id:905003,phase:2,deny,log,msg:'SSRF loopback HTTP target',severity:'CRITICAL',tag:'aegis-category-ssrf',tag:'attack-ssrf'"
SecRule ARGS "@contains http://localhost" "id:905004,phase:2,deny,log,msg:'SSRF localhost HTTP target',severity:'CRITICAL',tag:'aegis-category-ssrf',tag:'attack-ssrf'"
SecRule ARGS "@contains gopher://" "id:905005,phase:2,deny,log,msg:'SSRF gopher protocol target',severity:'CRITICAL',tag:'aegis-category-ssrf',tag:'attack-ssrf'"
SecRule ARGS "@contains file://" "id:905006,phase:2,deny,log,msg:'SSRF file protocol target',severity:'CRITICAL',tag:'aegis-category-ssrf',tag:'attack-ssrf'"
