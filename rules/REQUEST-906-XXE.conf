# ============================================================
# Aegis-WAF T149 XXE Rule Pack
# ============================================================
# 覆盖：XML外部实体注入(XXE)、Blind XXE、参数实体、
#       XML内容检测、外部DTD、XInclude攻击
# ============================================================

# ------------------------------------------------------------------
# 1. DOCTYPE 声明检测 (906001-906009)
# ------------------------------------------------------------------

# [906001] DOCTYPE 声明 (原有规则增强)
SecRule REQUEST_BODY|ARGS|ARGS_NAMES "@rx (<!DOCTYPE[^>]+>)i" \
    "id:906001,phase:2,deny,log,msg:'XXE: DOCTYPE Declaration Detected',severity:'ERROR',tag:'attack-xxe'"

# [906002] ENTITY 声明 (原有规则增强)
SecRule REQUEST_BODY|ARGS|ARGS_NAMES "@rx (<!ENTITY[^>]+>)i" \
    "id:906002,phase:2,deny,log,msg:'XXE: ENTITY Declaration Detected',severity:'ERROR',tag:'attack-xxe'"

# [906003] 外部实体: file:// 协议 (原有规则增强)
SecRule REQUEST_BODY|ARGS|ARGS_NAMES "@rx (SYSTEM\s+['\"]file://|PUBLIC\s+['\"][^'\"]+['\"]\s+['\"]file://)i" \
    "id:906003,phase:2,deny,log,msg:'XXE: File System External Entity',severity:'ERROR',tag:'attack-xxe'"

# [906004] 外部实体: HTTP/HTTPS 协议 (原有规则增强)
SecRule REQUEST_BODY|ARGS|ARGS_NAMES "@rx (SYSTEM\s+['\"](https?|ftp)://|PUBLIC\s+['\"][^'\"]+['\"]\s+['\"](https?|ftp)://)i" \
    "id:906004,phase:2,deny,log,msg:'XXE: HTTP/FTP External Entity',severity:'ERROR',tag:'attack-xxe'"

# [906005] XML Content-Type 检测 (原有规则增强)
SecRule REQUEST_HEADERS:Content-Type "@rx (application/xml|text/xml|application/x-xml)i" \
    "id:906005,phase:1,log,msg:'XXE: XML Request Content-Type Detected',severity:'NOTICE',tag:'attack-xxe'"

# [906006] DOCTYPE 包含 SYSTEM 关键字
SecRule REQUEST_BODY|ARGS|ARGS_NAMES "@rx <!DOCTYPE[^>]+SYSTEM[^>]+>i" \
    "id:906006,phase:2,deny,log,msg:'XXE: DOCTYPE with SYSTEM Keyword',severity:'ERROR',tag:'attack-xxe'"

# [906007] DOCTYPE 包含 PUBLIC 关键字
SecRule REQUEST_BODY|ARGS|ARGS_NAMES "@rx <!DOCTYPE[^>]+PUBLIC[^>]+>i" \
    "id:906007,phase:2,deny,log,msg:'XXE: DOCTYPE with PUBLIC Keyword',severity:'ERROR',tag:'attack-xxe'"

# [906008] 内部子集 DOCTYPE
SecRule REQUEST_BODY|ARGS|ARGS_NAMES "@rx <!DOCTYPE[^>]+\[[^]]*\]+>i" \
    "id:906008,phase:2,deny,log,msg:'XXE: DOCTYPE with Internal Subset',severity:'ERROR',tag:'attack-xxe'"

# [906009] 多个 DOCTYPE 声明
SecRule REQUEST_BODY|ARGS|ARGS_NAMES "@rx (<!DOCTYPE.*?>.*?<!DOCTYPE.*?>)s" \
    "id:906009,phase:2,deny,log,msg:'XXE: Multiple DOCTYPE Declarations',severity:'ERROR',tag:'attack-xxe'"

# ------------------------------------------------------------------
# 2. 外部实体 (906010-906019)
# ------------------------------------------------------------------

# [906010] SYSTEM 外部实体
SecRule REQUEST_BODY|ARGS|ARGS_NAMES "@rx <!ENTITY[^>]+SYSTEM[^>]+>i" \
    "id:906010,phase:2,deny,log,msg:'XXE: SYSTEM External Entity',severity:'ERROR',tag:'attack-xxe'"

# [906011] PUBLIC 外部实体
SecRule REQUEST_BODY|ARGS|ARGS_NAMES "@rx <!ENTITY[^>]+PUBLIC[^>]+>i" \
    "id:906011,phase:2,deny,log,msg:'XXE: PUBLIC External Entity',severity:'ERROR',tag:'attack-xxe'"

# [906012] 参数实体 (Parameter Entity)
SecRule REQUEST_BODY|ARGS|ARGS_NAMES "@rx <!ENTITY\s+%[^>]+>i" \
    "id:906012,phase:2,deny,log,msg:'XXE: Parameter Entity Declaration',severity:'ERROR',tag:'attack-xxe'"

# [906013] 外部参数实体
SecRule REQUEST_BODY|ARGS|ARGS_NAMES "@rx <!ENTITY\s+%\s+[^>]+SYSTEM[^>]+>i" \
    "id:906013,phase:2,deny,log,msg:'XXE: External Parameter Entity',severity:'ERROR',tag:'attack-xxe'"

# [906014] 实体引用
SecRule REQUEST_BODY|ARGS|ARGS_NAMES "@rx &amp;|&lt;|&gt;|&quot;|&apos;" \
    "id:906014,phase:2,log,msg:'XXE: Entity Reference Detected',severity:'NOTICE',tag:'attack-xxe'"

# [906015] 自定义实体引用
SecRule REQUEST_BODY|ARGS|ARGS_NAMES "@rx &[a-zA-Z_][a-zA-Z0-9_\.\-]*;" \
    "id:906015,phase:2,log,msg:'XXE: Custom Entity Reference Detected',severity:'ERROR',tag:'attack-xxe'"

# [906016] 外部实体多个组合
SecRule REQUEST_BODY|ARGS|ARGS_NAMES "@rx (<!ENTITY[^>]+>[^<]*&[^;]+;)" \
    "id:906016,phase:2,deny,log,msg:'XXE: External Entity Definition with Reference',severity:'ERROR',tag:'attack-xxe'"

# ------------------------------------------------------------------
# 3. Blind XXE / OOB (外带数据) (906020-906029)
# ------------------------------------------------------------------

# [906020] Blind XXE HTTP 外带
SecRule REQUEST_BODY|ARGS|ARGS_NAMES "@rx <!ENTITY[^>]+SYSTEM\s+['\"]https?://[^'\"]+['\"]>i" \
    "id:906020,phase:2,deny,log,msg:'XXE: Blind XXE HTTP Out-of-Band',severity:'ERROR',tag:'attack-xxe'"

# [906021] Blind XXE FTP 外带
SecRule REQUEST_BODY|ARGS|ARGS_NAMES "@rx <!ENTITY[^>]+SYSTEM\s+['\"]ftp://[^'\"]+['\"]>i" \
    "id:906021,phase:2,deny,log,msg:'XXE: Blind XXE FTP Out-of-Band',severity:'ERROR',tag:'attack-xxe'"

# [906022] Blind XXE 参数实体外带
SecRule REQUEST_BODY|ARGS|ARGS_NAMES "@rx <!ENTITY\s+%\s+[^>]+SYSTEM\s+['\"]https?://[^'\"]+['\"]>i" \
    "id:906022,phase:2,deny,log,msg:'XXE: Blind XXE Parameter Entity OOB',severity:'ERROR',tag:'attack-xxe'"

# [906023] Blind XXE DTD 外带 (DOCTYPE + ENTITY)
SecRule REQUEST_BODY|ARGS|ARGS_NAMES "@rx <!DOCTYPE[^>]+\[[^]]*<!ENTITY[^>]+SYSTEM[^>]+>[^]]*\]>i" \
    "id:906023,phase:2,deny,log,msg:'XXE: Blind XXE DOCTYPE with Entity OOB',severity:'ERROR',tag:'attack-xxe'"

# [906024] 外带数据 URL 特征
SecRule REQUEST_BODY|ARGS|ARGS_NAMES "@rx (collab|burp|interact|oast|ceye|dnslog|logdns|ngrok|requestbin|webhook\.site|hookbin|canarytokens)\.(com|net|org|io|eu)" \
    "id:906024,phase:2,deny,log,msg:'XXE: Known OOB/Interact Server Domain',severity:'ERROR',tag:'attack-xxe'"

# ------------------------------------------------------------------
# 4. 外部 DTD (906030-906039)
# ------------------------------------------------------------------

# [906030] 外部 DTD 引用
SecRule REQUEST_BODY|ARGS|ARGS_NAMES "@rx <!DOCTYPE[^>]+SYSTEM\s+['\"](https?|ftp)://[^'\"]+\.dtd['\"]>i" \
    "id:906030,phase:2,deny,log,msg:'XXE: External DTD Reference',severity:'ERROR',tag:'attack-xxe'"

# [906031] 外部 DTD + 实体
SecRule REQUEST_BODY|ARGS|ARGS_NAMES "@rx <!DOCTYPE[^>]+SYSTEM\s+['\"][^'\"]+\.dtd['\"][^>]*\[[^]]*\]>i" \
    "id:906031,phase:2,deny,log,msg:'XXE: External DTD with Internal Subset',severity:'ERROR',tag:'attack-xxe'"

# [906032] 知名外部 DTD
SecRule REQUEST_BODY|ARGS|ARGS_NAMES "@rx (evil\.dtd|malicious\.dtd|external\.dtd|xxe\.dtd|test\.dtd)" \
    "id:906032,phase:2,deny,log,msg:'XXE: Known Malicious DTD Reference',severity:'ERROR',tag:'attack-xxe'"

# ------------------------------------------------------------------
# 5. XXE 特定攻击向量 (906040-906049)
# ------------------------------------------------------------------

# [906040] 文件读取 XXE
SecRule REQUEST_BODY|ARGS|ARGS_NAMES "@rx (<!ENTITY[^>]+SYSTEM\s+['\"](file://|/etc/|C:\\\\))i" \
    "id:906040,phase:2,deny,log,msg:'XXE: File Read via External Entity',severity:'ERROR',tag:'attack-xxe'"

# [906041] 内网探测 XXE
SecRule REQUEST_BODY|ARGS|ARGS_NAMES "@rx (<!ENTITY[^>]+SYSTEM\s+['\"]https?://(127\.0\.0\.1|10\.|172\.1[6-9]|172\.2[0-9]|172\.3[0-1]|192\.168\.|169\.254\.))i" \
    "id:906041,phase:2,deny,log,msg:'XXE: Internal Network Probe via External Entity',severity:'ERROR',tag:'attack-xxe'"

# [906042] /etc/passwd 读取 XXE
SecRule REQUEST_BODY|ARGS|ARGS_NAMES "@rx (<!ENTITY[^>]+SYSTEM\s+['\"]file:///etc/passwd['\"]>)" \
    "id:906042,phase:2,deny,log,msg:'XXE: /etc/passwd File Read Attempt',severity:'ERROR',tag:'attack-xxe'"

# [906043] Windows 文件读取 XXE
SecRule REQUEST_BODY|ARGS|ARGS_NAMES "@rx (<!ENTITY[^>]+SYSTEM\s+['\"]file:///C:/(Windows|WINNT)/)i" \
    "id:906043,phase:2,deny,log,msg:'XXE: Windows File Read Attempt',severity:'ERROR',tag:'attack-xxe'"

# [906044] SSRF via XXE
SecRule REQUEST_BODY|ARGS|ARGS_NAMES "@rx (<!ENTITY[^>]+SYSTEM\s+['\"]https?://[^'\"]+['\"]>[^<]*&[^;]+;)" \
    "id:906044,phase:2,deny,log,msg:'XXE: SSRF via External Entity',severity:'ERROR',tag:'attack-xxe'"

# [906045] DoS via XXE (Billion Laughs 特征)
SecRule REQUEST_BODY|ARGS|ARGS_NAMES "@rx (<!ENTITY\s+\w+\s+['\"][^'\"]*['\"][^>]*>)s" \
    "id:906045,phase:2,deny,log,msg:'XXE: Potential Billion Laughs Attack (Nested Entities)',severity:'ERROR',tag:'attack-xxe'"

# [906046] 嵌套实体 (深度)
SecRule REQUEST_BODY|ARGS|ARGS_NAMES "@rx (<!ENTITY\s+[^>]+>\s*<![^>]+>\s*<![^>]+>\s*<![^>]+>)" \
    "id:906046,phase:2,deny,log,msg:'XXE: Deeply Nested Entity Detected',severity:'ERROR',tag:'attack-xxe'"

# [906047] XML 外部实体 + XSS
SecRule REQUEST_BODY|ARGS|ARGS_NAMES "@rx (<!ENTITY[^>]+SYSTEM[^>]+>[^<]*(<script|javascript:|onerror)[^<]*>)" \
    "id:906047,phase:2,deny,log,msg:'XXE: External Entity with XSS Payload',severity:'ERROR',tag:'attack-xxe'"

# ------------------------------------------------------------------
# 6. XInclude 攻击 (906050-906059)
# ------------------------------------------------------------------

# [906050] XInclude 引用
SecRule REQUEST_BODY|ARGS|ARGS_NAMES "@rx <xi:include\s+[^>]+>i" \
    "id:906050,phase:2,deny,log,msg:'XXE: XInclude Reference Detected',severity:'ERROR',tag:'attack-xxe'"

# [906051] XInclude + file://
SecRule REQUEST_BODY|ARGS|ARGS_NAMES "@rx <xi:include\s+href=['\"]file://[^'\"]+['\"]i" \
    "id:906051,phase:2,deny,log,msg:'XXE: XInclude File Read Attempt',severity:'ERROR',tag:'attack-xxe'"

# [906052] XInclude + HTTP
SecRule REQUEST_BODY|ARGS|ARGS_NAMES "@rx <xi:include\s+href=['\"](https?|ftp)://[^'\"]+['\"]i" \
    "id:906052,phase:2,deny,log,msg:'XXE: XInclude Remote Inclusion',severity:'ERROR',tag:'attack-xxe'"

# [906053] XInclude + 解析设置
SecRule REQUEST_BODY|ARGS|ARGS_NAMES "@rx <xi:include\s+[^>]*parse=['\"]xml['\"][^>]*>i" \
    "id:906053,phase:2,deny,log,msg:'XXE: XInclude XML Parse Attack',severity:'ERROR',tag:'attack-xxe'"

# ------------------------------------------------------------------
# 7. 编码/混淆绕过 (906060-906069)
# ------------------------------------------------------------------

# [906060] XML 实体编码
SecRule REQUEST_BODY|ARGS|ARGS_NAMES "@rx (&lt;!DOCTYPE|&lt;!ENTITY|&#60;!DOCTYPE|&#x3C;!DOCTYPE)" \
    "id:906060,phase:2,deny,log,msg:'XXE: HTML Entity Encoded DOCTYPE/ENTITY',severity:'ERROR',tag:'attack-xxe'"

# [906061] URL 编码绕过
SecRule REQUEST_BODY|ARGS|ARGS_NAMES "@rx (%3C!DOCTYPE|%3C!ENTITY|%3C%21DOCTYPE|%3C%21ENTITY)" \
    "id:906061,phase:2,deny,log,msg:'XXE: URL Encoded DOCTYPE/ENTITY',severity:'ERROR',tag:'attack-xxe'"

# [906062] 大小写混淆
SecRule REQUEST_BODY|ARGS|ARGS_NAMES "@rx (<![Dd][Oo][Cc][Tt][Yy][Pp][Ee]|<![Ee][Nn][Tt][Ii][Tt][Yy])" \
    "id:906062,phase:2,deny,log,msg:'XXE: Case-Obfuscated DOCTYPE/ENTITY',severity:'ERROR',tag:'attack-xxe'"

# [906063] 空白字符绕过
SecRule REQUEST_BODY|ARGS|ARGS_NAMES "@rx (<!\s*DOCTYPE|<!\s*ENTITY)" \
    "id:906063,phase:2,deny,log,msg:'XXE: Whitespace Obfuscated DOCTYPE/ENTITY',severity:'ERROR',tag:'attack-xxe'"

# [906064] 注释绕过
SecRule REQUEST_BODY|ARGS|ARGS_NAMES "@rx (<!\[CDATA\[[^]]*\]\]>|<!--[^>]*-->)s" \
    "id:906064,phase:2,log,msg:'XXE: CDATA/Comment Section Detected',severity:'ERROR',tag:'attack-xxe'"

# [906065] Unicode 编码绕过
SecRule REQUEST_BODY|ARGS|ARGS_NAMES "@rx (&#[0-9]+;.*DOCTYPE|&#x[0-9a-f]+;.*ENTITY)" \
    "id:906065,phase:2,deny,log,msg:'XXE: Unicode Encoded DOCTYPE/ENTITY',severity:'ERROR',tag:'attack-xxe'"

# ------------------------------------------------------------------
# 8. XML 内容检测 (906070-906079)
# ------------------------------------------------------------------

# [906070] XML 声明
SecRule REQUEST_BODY|ARGS|ARGS_NAMES "@rx <\?xml[^>]*\?>i" \
    "id:906070,phase:2,log,msg:'XXE: XML Declaration Detected',severity:'NOTICE',tag:'attack-xxe'"

# [906071] XML 编码声明
SecRule REQUEST_BODY|ARGS|ARGS_NAMES "@rx <\?xml[^>]*encoding=['\"]([^'\"]+)['\"]i" \
    "id:906071,phase:2,log,msg:'XXE: XML Encoding Declaration',severity:'NOTICE',tag:'attack-xxe'"

# [906072] XML 根元素
SecRule REQUEST_BODY|ARGS|ARGS_NAMES "@rx <[a-zA-Z_][a-zA-Z0-9_\-:]*[^>]*>[^<]*</[a-zA-Z_][a-zA-Z0-9_\-:]*>i" \
    "id:906072,phase:2,log,msg:'XXE: XML Root Element Detected',severity:'NOTICE',tag:'attack-xxe'"

# [906073] XML 命名空间
SecRule REQUEST_BODY|ARGS|ARGS_NAMES "@rx xmlns:?[a-zA-Z]*=['\"][^'\"]+['\"]i" \
    "id:906073,phase:2,log,msg:'XXE: XML Namespace Declaration',severity:'NOTICE',tag:'attack-xxe'"

# [906074] XML 注释
SecRule REQUEST_BODY|ARGS|ARGS_NAMES "@rx <!--[^>]*-->" \
    "id:906074,phase:2,log,msg:'XXE: XML Comment Detected',severity:'NOTICE',tag:'attack-xxe'"

# [906075] XML CDATA 段
SecRule REQUEST_BODY|ARGS|ARGS_NAMES "@rx <!\[CDATA\[[^]]*\]\]>" \
    "id:906075,phase:2,log,msg:'XXE: CDATA Section Detected',severity:'NOTICE',tag:'attack-xxe'"

# [906076] XML 处理指令
SecRule REQUEST_BODY|ARGS|ARGS_NAMES "@rx <\?[a-zA-Z_][a-zA-Z0-9_\-]*[^>]*\?>" \
    "id:906076,phase:2,log,msg:'XXE: XML Processing Instruction',severity:'NOTICE',tag:'attack-xxe'"

# ------------------------------------------------------------------
# 9. 综合检测 (906080-906089)
# ------------------------------------------------------------------

# [906080] XXE 攻击链 (DOCTYPE + ENTITY + 引用)
SecRule REQUEST_BODY|ARGS|ARGS_NAMES "@rx (<!DOCTYPE[^>]*\[[^]]*<!ENTITY[^>]*>[^]]*&[^;]+;[^]]*\])" \
    "id:906080,phase:2,deny,log,msg:'XXE: Complete Attack Chain (DOCTYPE+ENTITY+Reference)',severity:'ERROR',tag:'attack-xxe'"

# [906081] 多层 XXE 嵌套
SecRule REQUEST_BODY|ARGS|ARGS_NAMES "@rx (<!ENTITY[^>]*>[^<]*<!ENTITY[^>]*>[^<]*<!ENTITY[^>]*>)" \
    "id:906081,phase:2,deny,log,msg:'XXE: Multi-layer Entity Nesting',severity:'ERROR',tag:'attack-xxe'"

# [906082] XXE + 其他攻击组合
SecRule REQUEST_BODY|ARGS|ARGS_NAMES "@rx (<!DOCTYPE[^>]*>.*)(<script|javascript:|union select|or 1=1)is" \
    "id:906082,phase:2,deny,log,msg:'XXE: Combined Attack (XXE + XSS/SQLi)',severity:'ERROR',tag:'attack-xxe'"

# [906083] 二进制/非文本 XML 内容
SecRule REQUEST_BODY "@rx [^\x09\x0A\x0D\x20-\x7E]" \
    "id:906083,phase:2,log,msg:'XXE: Non-printable XML Content Detected',severity:'ERROR',tag:'attack-xxe'"
