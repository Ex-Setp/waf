SecRule ARGS "@contains .jsp" "id:907002,phase:2,deny,log,msg:'Upload executable JSP extension',severity:'CRITICAL',tag:'aegis-category-upload',tag:'attack-upload'"
SecRule ARGS "@contains .aspx" "id:907003,phase:2,deny,log,msg:'Upload executable ASPX extension',severity:'CRITICAL',tag:'aegis-category-upload',tag:'attack-upload'"
SecRule ARGS "@contains webshell_eval_post" "id:907004,phase:2,deny,log,msg:'PHP webshell eval POST stub indicator',severity:'CRITICAL',tag:'aegis-category-upload',tag:'attack-webshell'"
SecRule ARGS "@contains webshell_system_get" "id:907005,phase:2,deny,log,msg:'PHP webshell system GET stub indicator',severity:'CRITICAL',tag:'aegis-category-upload',tag:'attack-webshell'"
SecRule ARGS "@contains jsp_runtime_exec" "id:907006,phase:2,deny,log,msg:'JSP webshell Runtime exec stub indicator',severity:'CRITICAL',tag:'aegis-category-upload',tag:'attack-webshell'"
