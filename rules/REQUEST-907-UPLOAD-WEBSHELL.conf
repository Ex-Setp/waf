# Aegis-WAF T153 upload and webshell rule pack.
SecRule ARGS "@contains path_traversal" "id:907002,phase:2,deny,log,msg:'Upload filename path traversal detected',severity:'CRITICAL',tag:'aegis-category-upload',tag:'attack-upload'"
SecRule ARGS "@contains executable_extension" "id:907003,phase:2,deny,log,msg:'Upload executable extension detected',severity:'CRITICAL',tag:'aegis-category-upload',tag:'attack-upload'"
SecRule ARGS "@contains double_extension" "id:907004,phase:2,deny,log,msg:'Upload double extension detected',severity:'CRITICAL',tag:'aegis-category-upload',tag:'attack-upload'"
SecRule ARGS "@contains content_type_mismatch" "id:907005,phase:2,deny,log,msg:'Upload content-type and magic mismatch detected',severity:'CRITICAL',tag:'aegis-category-upload',tag:'attack-upload'"
SecRule ARGS "@contains webshell_code" "id:907006,phase:2,deny,log,msg:'Upload webshell code indicator detected',severity:'CRITICAL',tag:'aegis-category-webshell',tag:'attack-webshell'"
SecRule ARGS "@contains <?php" "id:907007,phase:2,deny,log,msg:'PHP webshell code snippet detected',severity:'CRITICAL',tag:'aegis-category-webshell',tag:'attack-webshell'"
SecRule ARGS "@contains Runtime.getRuntime().exec" "id:907008,phase:2,deny,log,msg:'JSP webshell Runtime exec snippet detected',severity:'CRITICAL',tag:'aegis-category-webshell',tag:'attack-webshell'"
SecRule ARGS "@contains ProcessBuilder" "id:907009,phase:2,deny,log,msg:'JSP webshell ProcessBuilder snippet detected',severity:'CRITICAL',tag:'aegis-category-webshell',tag:'attack-webshell'"
SecRule ARGS "@contains <script runat=\"server\">" "id:907010,phase:2,deny,log,msg:'ASPX webshell server script snippet detected',severity:'CRITICAL',tag:'aegis-category-webshell',tag:'attack-webshell'"
SecRule ARGS "@contains webshell_eval_post" "id:907011,phase:2,deny,log,msg:'PHP webshell eval POST stub indicator',severity:'CRITICAL',tag:'aegis-category-webshell',tag:'attack-webshell'"
SecRule ARGS "@contains webshell_system_get" "id:907012,phase:2,deny,log,msg:'PHP webshell system GET stub indicator',severity:'CRITICAL',tag:'aegis-category-webshell',tag:'attack-webshell'"
SecRule ARGS "@contains jsp_runtime_exec" "id:907013,phase:2,deny,log,msg:'JSP webshell Runtime exec stub indicator',severity:'CRITICAL',tag:'aegis-category-webshell',tag:'attack-webshell'"
