# ============================================================
# Aegis-WAF T149 Scanner and CVE Probe Rule Pack
# ============================================================
# 覆盖：扫描器User-Agent检测、CVE漏洞探测路径、
#       敏感路径暴露、信息泄露、已知漏洞特征
# ============================================================

# ------------------------------------------------------------------
# 1. 扫描器 User-Agent 检测 (908001-908009)
# ------------------------------------------------------------------

# [908001] sqlmap (原有规则增强)
SecRule REQUEST_HEADERS:User-Agent "@rx (?i)(sqlmap|sqlmap/)" \
    "id:908001,phase:1,deny,log,msg:'Scanner: sqlmap User-Agent Detected',severity:'CRITICAL',tag:'automation-scanner'"

# [908002] nuclei (原有规则增强)
SecRule REQUEST_HEADERS:User-Agent "@rx (?i)(nuclei|nuclei/)" \
    "id:908002,phase:1,deny,log,msg:'Scanner: nuclei User-Agent Detected',severity:'CRITICAL',tag:'automation-scanner'"

# [908003] nikto (原有规则增强)
SecRule REQUEST_HEADERS:User-Agent "@rx (?i)(nikto|Nikto|nikto/)" \
    "id:908003,phase:1,deny,log,msg:'Scanner: nikto User-Agent Detected',severity:'CRITICAL',tag:'automation-scanner'"

# [908004] 常见扫描器 User-Agent 聚合
SecRule REQUEST_HEADERS:User-Agent "@rx (?i)(nmap|masscan|zmap|zombie|w3af|waffit|acunetix|netsparker|appscan|burp|dirbuster|gobuster|ffuf|wfuzz|hydra|medusa|ncat|socat|zap|openvas|nessus|arachni|skipfish|vega|beef|whatweb|wpscan|joomscan|droopescan|wig|arachni|skipfish|vega|masscan|shodan|censys|zoomeye|fofa|binaryedge|securitytrails)" \
    "id:908004,phase:1,deny,log,msg:'Scanner: Known Scanner User-Agent Detected',severity:'CRITICAL',tag:'automation-scanner'"

# [908005] 安全扫描工具 User-Agent
SecRule REQUEST_HEADERS:User-Agent "@rx (?i)(Qualys|Nessus|OpenVAS|Nexpose|Rapid7|Tenable|McAfee|Symantec|TrendMicro|Fortinet|CheckPoint|PaloAlto|CrowdStrike)" \
    "id:908005,phase:1,deny,log,msg:'Scanner: Enterprise Security Scanner Detected',severity:'WARNING',tag:'automation-scanner'"

# [908006] 自动化/爬虫 User-Agent
SecRule REQUEST_HEADERS:User-Agent "@rx (?i)(python-requests|wget|http-client|axios|node-fetch|python-urllib|Go-http-client|Java-http-client|Apache-HttpClient|OkHttp|Scrapy|PhantomJS|Selenium|Puppeteer|Playwright|HeadlessChrome)" \
    "id:908006,phase:1,deny,log,msg:'Scanner: Automation/Headless User-Agent Detected',severity:'CRITICAL',tag:'automation-bot'"

# [908007] 缺少 User-Agent
SecRule REQUEST_HEADERS:User-Agent "^$" \
    "id:908007,phase:1,deny,log,msg:'Scanner: Missing User-Agent Header',severity:'WARNING',tag:'automation-scanner'"

# [908008] 空 User-Agent
SecRule REQUEST_HEADERS:User-Agent "^[\s]*$" \
    "id:908008,phase:1,deny,log,msg:'Scanner: Empty User-Agent Header',severity:'WARNING',tag:'automation-scanner'"

# [908009] 异常 User-Agent 长度
SecRule REQUEST_HEADERS:User-Agent "@rx ^.{0,5}$" \
    "id:908009,phase:1,deny,log,msg:'Scanner: Abnormal User-Agent Length',severity:'WARNING',tag:'automation-scanner'"

# ------------------------------------------------------------------
# 2. WordPress 漏洞探测 (908010-908019)
# ------------------------------------------------------------------

# [908010] WordPress 管理后台 (原有规则增强)
SecRule REQUEST_URI "@rx (?i)(/wp-admin/|/wp-login\.php|/xmlrpc\.php)" \
    "id:908010,phase:2,deny,log,msg:'CVE Probe: WordPress Admin/Login Path Detected',severity:'WARNING',tag:'cve-probe'"

# [908011] WordPress 敏感文件
SecRule REQUEST_URI "@rx (?i)(/wp-config\.php|/wp-config\.bak|/wp-config\.old|/\.htaccess|/wp-content/uploads/|/wp-includes/)" \
    "id:908011,phase:2,deny,log,msg:'CVE Probe: WordPress Sensitive File Access',severity:'INFO',tag:'cve-probe'"

# [908012] WordPress 版本探测
SecRule REQUEST_URI "@rx (?i)(/readme\.html|/license\.txt|/wp-admin/install\.php|/wp-admin/upgrade\.php|/wp-content/themes/[^/]+/style\.css)" \
    "id:908012,phase:2,deny,log,msg:'CVE Probe: WordPress Version Fingerprinting',severity:'WARNING',tag:'cve-probe'"

# [908013] WordPress 插件探测
SecRule REQUEST_URI "@rx (?i)(/wp-content/plugins/(wp-file-manager|elementor|wordfence|akismet|jetpack|woocommerce|advanced-custom-fields|contact-form-7|yoast|all-in-one-seo-pack|w3-total-cache|wp-super-cache|updraftplus|backwpup|duplicator|wp-migrate-db))" \
    "id:908013,phase:2,deny,log,msg:'CVE Probe: WordPress Plugin Discovery',severity:'WARNING',tag:'cve-probe'"

# [908014] WordPress 主题探测
SecRule REQUEST_URI "@rx (?i)(/wp-content/themes/[a-z0-9_-]+/)" \
    "id:908014,phase:2,deny,log,msg:'CVE Probe: WordPress Theme Discovery',severity:'WARNING',tag:'cve-probe'"

# [908015] WordPress REST API 探测
SecRule REQUEST_URI "@rx (?i)(/wp-json/|/wp-json/wp/v2/|/rest-api/|/oembed/1\.0/embed\?url=)" \
    "id:908015,phase:2,deny,log,msg:'CVE Probe: WordPress REST API Discovery',severity:'WARNING',tag:'cve-probe'"

# [908016] WordPress XML-RPC 攻击
SecRule REQUEST_URI "@rx (?i)(/xmlrpc\.php)" \
    "id:908016,phase:2,deny,log,msg:'CVE Probe: WordPress XML-RPC Endpoint Accessed',severity:'WARNING',tag:'cve-probe'"

# ------------------------------------------------------------------
# 3. Java/Spring 漏洞探测 (908020-908029)
# ------------------------------------------------------------------

# [908020] Spring Actuator (原有规则增强)
SecRule REQUEST_URI "@rx (?i)(/actuator(/env|/health|/info|/metrics|/beans|/mappings|/configprops|/trace|/dump|/heapdump|/threaddump|/loggers|/liquibase|/flyway|/scheduledtasks|/conditions|/shutdown|/prometheus|/auditevents|/caches|/quartz|/integrationgraph|/logfile|/refresh|/restart|/pause|/resume|/cloudfoundryapplication))" \
    "id:908020,phase:2,deny,log,msg:'CVE Probe: Spring Actuator Endpoint Access',severity:'INFO',tag:'cve-probe'"

# [908026] Spring Actuator env 高危端点
SecRule REQUEST_URI "@rx (?i)(/actuator/env)" \
    "id:908026,phase:2,deny,log,msg:'CVE Probe: Spring Actuator Env Endpoint Access',severity:'CRITICAL',tag:'cve-probe'"

# [908021] Spring Boot 敏感文件
SecRule REQUEST_URI "@rx (?i)(/application\.properties|/application\.yml|/application\.yaml|/bootstrap\.properties|/bootstrap\.yml|/application-default\.properties|/application-dev\.properties|/application-prod\.properties|/application-test\.properties|/application\.json|/config\.yml|/config\.yaml)" \
    "id:908021,phase:2,deny,log,msg:'CVE Probe: Spring Boot Config File Access',severity:'WARNING',tag:'cve-probe'"

# [908022] Spring Cloud Gateway 漏洞
SecRule REQUEST_URI "@rx (?i)(/actuator/gateway/routes|/actuator/gateway/globalfilters|/actuator/gateway/routefilters|/actuator/gateway/refresh)" \
    "id:908022,phase:2,deny,log,msg:'CVE Probe: Spring Cloud Gateway Route Access (CVE-2022-22947)',severity:'WARNING',tag:'cve-probe'"

# [908023] Spring Data REST 探测
SecRule REQUEST_URI "@rx (?i)(/rest/|/data/|/repository/|/search/(?:find|count|exists|delete|save)|/profile(?:/|$)|/\$metadata(?:$|[/?]))" \
    "id:908023,phase:2,deny,log,msg:'CVE Probe: Spring Data REST Endpoint Discovery',severity:'INFO',tag:'cve-probe'"

# [908024] Spring4Shell (CVE-2022-22965) 特征
SecRule REQUEST_URI|ARGS "@rx (class\.module\.|class\.loader\.|class\.protectionDomain|class\.java\.|class\.classLoader\.)" \
    "id:908024,phase:2,deny,log,msg:'CVE Probe: Spring4Shell (CVE-2022-22965) Exploit Attempt',severity:'WARNING',tag:'cve-probe'"

# [908025] Spring Session 探测
SecRule REQUEST_URI "@rx (?i)(/session/|/sessions/|/spring-session/)" \
    "id:908025,phase:2,deny,log,msg:'CVE Probe: Spring Session Discovery',severity:'WARNING',tag:'cve-probe'"

# ------------------------------------------------------------------
# 4. PHPUnit/Tool 探测 (908030-908039)
# ------------------------------------------------------------------

# [908030] PHPUnit 暴露 (原有规则增强)
SecRule REQUEST_URI "@rx (?i)(/vendor/phpunit/|/phpunit/|/tests/|/test/|/phpunit\.xml|/build/|/phpunit\.phar)" \
    "id:908030,phase:2,deny,log,msg:'CVE Probe: PHPUnit Exposed Path (CVE-2017-9841)',severity:'CRITICAL',tag:'cve-probe'"

# [908031] Composer/依赖探测
SecRule REQUEST_URI "@rx (?i)(/composer\.json|/composer\.lock|/vendor/|/composer/|/composer\.phar|/composer\.l\.ock)" \
    "id:908031,phase:2,deny,log,msg:'CVE Probe: Composer Dependency File Access',severity:'INFO',tag:'cve-probe'"

# [908032] PHP 错误日志/敏感文件
SecRule REQUEST_URI "@rx (?i)(/error_log|/error\.log|/php_error\.log|/debug\.log|/trace\.log|/log\.txt|/\.env|/\.env\.example|/\.env\.local|/\.env\.development|/\.env\.production|/\.env\.test|/\.env\.staging)" \
    "id:908032,phase:2,deny,log,msg:'CVE Probe: PHP Error Log/Env File Access',severity:'WARNING',tag:'cve-probe'"

# [908033] PHPInfo 暴露
SecRule REQUEST_URI "@rx (?i)(/phpinfo\.php|/info\.php|/test\.php|/php\.php|/php7\.php|/php5\.php|/phpinfo/)" \
    "id:908033,phase:2,deny,log,msg:'CVE Probe: phpinfo() File Access',severity:'WARNING',tag:'cve-probe'"

# [908034] Laravel 探测
SecRule REQUEST_URI "@rx (?i)(/vendor/laravel/|/storage/logs/|/bootstrap/cache/|/.env\.laravel|/artisan|/server\.php|/tinker\.php|/laravel\.php)" \
    "id:908034,phase:2,deny,log,msg:'CVE Probe: Laravel Framework Discovery',severity:'WARNING',tag:'cve-probe'"

# [908035] 其他PHP框架探测
SecRule REQUEST_URI "@rx (?i)(/vendor/(symfony|zend|zf|yiisoft|codeigniter|cakephp|laravel|slim|flight|fatfree|fuelphp|phalcon|swoole|hyperf|webman))" \
    "id:908035,phase:2,deny,log,msg:'CVE Probe: PHP Framework Discovery',severity:'WARNING',tag:'cve-probe'"

# ------------------------------------------------------------------
# 5. Tomcat/Web 服务器探测 (908040-908049)
# ------------------------------------------------------------------

# [908040] Tomcat Manager (原有规则增强)
SecRule REQUEST_URI "@rx (?i)(/manager/html|/manager/status|/manager/text|/manager/list|/manager/reload|/manager/deploy|/manager/undeploy|/manager/start|/manager/stop|/manager/sessions|/manager/expire|/manager/resources|/manager/upload|/manager/jmxproxy|/manager/status/all|/manager/status/)" \
    "id:908040,phase:2,deny,log,msg:'CVE Probe: Tomcat Manager Interface Access',severity:'CRITICAL',tag:'cve-probe'"

# [908041] Tomcat 敏感文件
SecRule REQUEST_URI "@rx (?i)(/WEB-INF/web\.xml|/WEB-INF/applicationContext\.xml|/META-INF/MANIFEST\.MF|/conf/server\.xml|/conf/context\.xml|/conf/tomcat-users\.xml|/conf/web\.xml|/conf/catalina\.properties|/conf/logging\.properties)" \
    "id:908041,phase:2,deny,log,msg:'CVE Probe: Tomcat Config File Access',severity:'WARNING',tag:'cve-probe'"

# [908042] Tomcat 示例应用（观察，避免 /docs 等正常文档路径误封）
SecRule REQUEST_URI "@rx (?i)(/examples/|/manager/|/host-manager/|/helloworld/|/webapps/|/ROOT/examples?/)" \
    "id:908042,phase:2,log,msg:'CVE Probe: Tomcat Sample Application Access',severity:'WARNING',tag:'cve-probe'"

# [908043] Tomcat CVE-2017-12615 (PUT 方法)
SecRule REQUEST_METHOD "@streq PUT" \
    "chain"
    SecRule REQUEST_URI "@rx \.(jsp|jspx)$" \
    "id:908043,phase:1,log,msg:'CVE Probe: Tomcat PUT Method Exploit (CVE-2017-12615)',severity:'WARNING',tag:'cve-probe'"

# [908044] Tomcat CVE-2020-1938 (Ghostcat)
SecRule REQUEST_URI "@rx (?i)(/WEB-INF/web\.xml|/WEB-INF/classes/|/META-INF/context\.xml)" \
    "chain"
    SecRule REQUEST_HEADERS:Connection "@streq Upgrade" \
    "id:908044,phase:2,log,msg:'CVE Probe: Tomcat Ghostcat (CVE-2020-1938) Attempt',severity:'WARNING',tag:'cve-probe'"

# ------------------------------------------------------------------
# 6. 其他 Web 服务器/CVE 探测 (908050-908059)
# ------------------------------------------------------------------

# [908050] Nginx/Apache 敏感路径
SecRule REQUEST_URI "@rx (?i)(/.htaccess|/.htpasswd|/.htgroup|/\.git/|/\.svn/|/\.hg/|/\.bzr/|/\.DS_Store|/\.idea/|/\.vscode/|/\.env|/\.gitlab-ci\.yml|/\.travis\.yml|/\.circleci/|/\.github/)" \
    "id:908050,phase:2,deny,log,msg:'CVE Probe: Web Server Sensitive File Access',severity:'WARNING',tag:'cve-probe'"

# [908051] Nginx/Apache 配置文件
SecRule REQUEST_URI "@rx (?i)(/nginx\.conf|/apache2\.conf|/httpd\.conf|/sites-available/|/sites-enabled/|/conf\.d/|/mods-available/|/mods-enabled/)" \
    "id:908051,phase:2,deny,log,msg:'CVE Probe: Web Server Config File Access',severity:'WARNING',tag:'cve-probe'"

# [908052] 数据库管理界面
SecRule REQUEST_URI "@rx (?i)(/phpmyadmin/|/pma/|/myadmin/|/dbadmin/|/mysql/|/phpPgAdmin/|/pgadmin/|/adminer/|/sqlite/|/mongoadmin/|/redis-admin/|/couchdb/|/elasticsearch/|/kibana/|/grafana/|/prometheus/|/jupyter/|/hue/|/airflow/|/superset/|/metabase/|/redash/|/looker/|/powerbi/|/tableau/)" \
    "id:908052,phase:2,deny,log,msg:'CVE Probe: Database Admin Interface Access',severity:'WARNING',tag:'cve-probe'"

# [908053] 备份/临时文件探测
SecRule REQUEST_URI "@rx \.(bak|backup|old|orig|temp|tmp|swp|swo|~|#|.php~|.jsp~|.asp~|.sql|.sqlite|.db|.dump)$" \
    "id:908053,phase:2,deny,log,msg:'CVE Probe: Backup/Temp File Access',severity:'WARNING',tag:'cve-probe'"

# [908054] Git/SVN 泄露探测
SecRule REQUEST_URI "@rx (?i)(/\.git/|/\.svn/|/\.hg/|/\.bzr/|/\.cvs/|/\.gitignore|/\.gitattributes|/\.gitmodules|/\.git/config|/\.git/HEAD|/\.git/index|/\.git/logs/|/\.git/refs/|/\.git/objects/|/\.svn/entries|/\.svn/wc\.db|/\.svn/format|/\.svn/pristine/)" \
    "id:908054,phase:2,deny,log,msg:'CVE Probe: Version Control System Leak',severity:'WARNING',tag:'cve-probe'"

# [908055] 目录列表探测
SecRule REQUEST_URI "@rx (?i)(/webdav/|/cgi-bin/|/cgi/|/pl/|/perl/|/cgi-sys/|/cgi-mod/|/cgiwrap/|/cgi-bin/|/cgi-bin/test-cgi|/cgi-bin/printenv|/cgi-bin/php|/cgi-bin/perl|/cgi-bin/pl|/cgi-bin/py|/cgi-bin/rb|/cgi-bin/sh|/cgi-bin/bash|/cgi-bin/python|/cgi-bin/ruby|/cgi-bin/php5|/cgi-bin/php7|/cgi-bin/asp|/cgi-bin/aspx|/cgi-bin/jsp|/cgi-bin/jspx)" \
    "id:908055,phase:2,deny,log,msg:'CVE Probe: CGI/Directory Listing Access',severity:'WARNING',tag:'cve-probe'"

# ------------------------------------------------------------------
# 7. 特定 CVE 探测 (908060-908069)
# ------------------------------------------------------------------

# [908060] Log4Shell (CVE-2021-44228)
SecRule REQUEST_URI|ARGS|REQUEST_HEADERS "@rx (\$\{jndi:(ldap|rmi|dns|http|https|iiop):[^}]+\})" \
    "id:908060,phase:2,deny,log,msg:'CVE Probe: Log4Shell (CVE-2021-44228) Exploit Attempt',severity:'CRITICAL',tag:'cve-probe'"

# [908061] Struts2 (CVE-2017-5638)
SecRule REQUEST_HEADERS:Content-Type "@rx (%\{[^}]*\}|#\{[^}]*\})" \
    "id:908061,phase:1,deny,log,msg:'CVE Probe: Apache Struts2 (CVE-2017-5638) Exploit Attempt',severity:'CRITICAL',tag:'cve-probe'"

# [908062] Apache Struts2 OGNL (CVE-2017-9805)
SecRule REQUEST_URI|ARGS "@rx (\#_memberAccess|context\.getMemberAccess|ognl\.OgnlContext)" \
    "id:908062,phase:2,deny,log,msg:'CVE Probe: Apache Struts2 OGNL (CVE-2017-9805) Attempt',severity:'WARNING',tag:'cve-probe'"

# [908063] Apache Shiro (CVE-2016-4437)
SecRule REQUEST_URI "@rx (?i)(/shiro/|/rememberMe=|/principal=|/subject/)" \
    "id:908063,phase:2,deny,log,msg:'CVE Probe: Apache Shiro (CVE-2016-4437) Attempt',severity:'WARNING',tag:'cve-probe'"

# [908064] Apache Tomcat CVE-2020-9484
SecRule REQUEST_URI|ARGS "@rx (?i)(session\.servlet\.|jsessionid=.*\.\./|FileStore|javax\.servlet\.http\.HttpServlet)" \
    "id:908064,phase:2,deny,log,msg:'CVE Probe: Apache Tomcat (CVE-2020-9484) Attempt',severity:'WARNING',tag:'cve-probe'"

# [908065] Drupal (CVE-2018-7600)
SecRule REQUEST_URI|ARGS "@rx (?i)(/user/register|/user/login|/user/password|/admin/|/node/|/drupal/|/sites/default/)" \
    "id:908065,phase:2,deny,log,msg:'CVE Probe: Drupal (CVE-2018-7600) Attempt',severity:'INFO',tag:'cve-probe'"

# [908066] Joomla (CVE-2017-8917)
SecRule REQUEST_URI "@rx (?i)(/administrator/|/components/|/modules/|/plugins/|/templates/|/includes/|/libraries/|/media/|/images/)" \
    "id:908066,phase:2,deny,log,msg:'CVE Probe: Joomla (CVE-2017-8917) Attempt',severity:'WARNING',tag:'cve-probe'"

# [908067] Shellshock (CVE-2014-6271)
SecRule REQUEST_HEADERS "@rx () \{ :; \};" \
    "id:908067,phase:1,deny,log,msg:'CVE Probe: Shellshock (CVE-2014-6271) Attempt',severity:'CRITICAL',tag:'cve-probe'"

# [908068] Heartbleed (CVE-2014-0160)
SecRule REQUEST_URI "@rx (?i)(/heartbleed|/ssl|/tls|/openssl|/cve-2014-0160)" \
    "id:908068,phase:2,deny,log,msg:'CVE Probe: Heartbleed (CVE-2014-0160) Attempt',severity:'WARNING',tag:'cve-probe'"

# [908069] EternalBlue (CVE-2017-0144)
SecRule REQUEST_URI "@rx (?i)(/eternalblue|/eternal-blue|/ms17-010|/smb|/445|/cve-2017-0144)" \
    "id:908069,phase:2,deny,log,msg:'CVE Probe: EternalBlue (CVE-2017-0144) Attempt',severity:'WARNING',tag:'cve-probe'"

