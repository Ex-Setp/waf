# Aegis-WAF T149 HTTP protocol anomaly rule pack.
SecRule REQUEST_HEADERS "@contains chunked, chunked" "id:909001,phase:1,deny,log,msg:'HTTP request smuggling duplicate chunked transfer coding',severity:'CRITICAL',tag:'aegis-category-protocol',tag:'protocol-anomaly'"
SecRule REQUEST_HEADERS "@contains Transfer-Encoding: chunked" "id:909002,phase:1,log,msg:'HTTP transfer encoding requires smuggling inspection',severity:'NOTICE',tag:'aegis-category-protocol',tag:'protocol-anomaly'"
SecRule REQUEST_HEADERS "@contains x-original-url" "id:909003,phase:1,deny,log,msg:'HTTP path override header smuggling probe',severity:'CRITICAL',tag:'aegis-category-protocol',tag:'protocol-anomaly'"
SecRule REQUEST_HEADERS "@contains x-rewrite-url" "id:909004,phase:1,deny,log,msg:'HTTP rewrite URL header bypass probe',severity:'CRITICAL',tag:'aegis-category-protocol',tag:'protocol-anomaly'"
SecRule REQUEST_METHOD "@streq TRACE" "id:909005,phase:1,deny,log,msg:'HTTP TRACE method probe',severity:'WARNING',tag:'aegis-category-protocol',tag:'protocol-anomaly'"
SecRule REQUEST_URI "@contains %00" "id:909006,phase:2,deny,log,msg:'Null byte path anomaly',severity:'CRITICAL',tag:'aegis-category-protocol',tag:'protocol-anomaly'"
