# ============================================================
# Aegis-WAF T149 API, JSON, GraphQL and JWT Rule Pack
# ============================================================
# 覆盖：GraphQL注入/内省、JWT攻击、JSON注入、
#       API滥用、速率限制、参数污染
# ============================================================

# ------------------------------------------------------------------
# 1. GraphQL 内省/探测 (910001-910009)
# ------------------------------------------------------------------

# [910001] GraphQL __schema 内省 (原有规则增强)
SecRule GRAPHQL:has_introspection "@streq true" \
    "id:910001,phase:2,deny,log,msg:'GraphQL: __schema Introspection Probe',severity:'CRITICAL',tag:'attack-graphql'"

# [910002] GraphQL __type 内省 (原有规则增强)
SecRule ARGS:query "@rx __type" \
    "id:910002,phase:2,deny,log,msg:'GraphQL: __type Introspection Probe',severity:'ERROR',tag:'attack-graphql'"

# [910003] GraphQL mutation 操作 (原有规则增强)
SecRule REQUEST_BODY|ARGS|ARGS_NAMES "@rx mutation\s*\{|mutation\s+[a-zA-Z_]+\s*\{" \
    "id:910003,phase:2,log,msg:'GraphQL: Mutation Request Detected',severity:'NOTICE',tag:'attack-graphql'"

# [910004] GraphQL query 操作检测
SecRule REQUEST_BODY|ARGS|ARGS_NAMES "@rx (query|mutation|subscription)\s*(\{|\s+[a-zA-Z_]+\s*\()" \
    "id:910004,phase:2,log,msg:'GraphQL: Operation Type Detected',severity:'NOTICE',tag:'attack-graphql'"

# [910005] GraphQL 字段探测
SecRule REQUEST_BODY|ARGS|ARGS_NAMES "@rx (users|posts|comments|profiles|orders|products|customers|transactions|payments|accounts|auth|login|register|settings|config|admin|system|audit|logs|metrics|analytics)\s*\([^)]*\)\s*\{[^}]*\}" \
    "id:910005,phase:2,log,msg:'GraphQL: Sensitive Field Probe',severity:'ERROR',tag:'attack-graphql'"

# [910006] GraphQL 批量查询检测
SecRule REQUEST_BODY "@rx (query\s+[a-zA-Z_]+\s*\{[^}]*\}\s*query\s+[a-zA-Z_]+\s*\{[^}]*\}|mutation\s+[a-zA-Z_]+\s*\{[^}]*\}\s*mutation\s+[a-zA-Z_]+\s*\{[^}]*\})" \
    "id:910006,phase:2,deny,log,msg:'GraphQL: Batch Query/Mutation Detected (Potential DoS)',severity:'ERROR',tag:'attack-graphql'"

# [910007] GraphQL 别名攻击
SecRule REQUEST_BODY "@rx \w+\s*:\s*\w+\s*\([^)]*\)\s*\{[^}]*\}" \
    "id:910007,phase:2,log,msg:'GraphQL: Alias Usage Detected',severity:'NOTICE',tag:'attack-graphql'"

# [910008] GraphQL 深度嵌套查询
SecRule GRAPHQL:depth "@gt 12" \
    "id:910008,phase:2,deny,log,msg:'GraphQL: Deeply Nested Query (Depth Attack)',severity:'CRITICAL',tag:'attack-graphql'"

# [910009] GraphQL 内省绕过 (别名)
SecRule ARGS:query "@rx [a-zA-Z_][a-zA-Z0-9_]*\s*:\s*__schema|[a-zA-Z_][a-zA-Z0-9_]*\s*:\s*__type" \
    "id:910009,phase:2,deny,log,msg:'GraphQL: Introspection via Alias Bypass',severity:'ERROR',tag:'attack-graphql'"

# ------------------------------------------------------------------
# 2. GraphQL 注入 (910010-910019)
# ------------------------------------------------------------------

# [910010] GraphQL 参数注入 (SQLi via GraphQL)
SecRule REQUEST_BODY|ARGS|ARGS_NAMES "@rx (where\s*:\s*\{[^}]*['\"](or|and|select|union)[^}]*\}|filter\s*:\s*\{[^}]*['\"](or|and)[^}]*\})" \
    "id:910010,phase:2,deny,log,msg:'GraphQL: SQL Injection via GraphQL Parameter',severity:'ERROR',tag:'attack-graphql'"

# [910011] GraphQL NoSQL 注入
SecRule REQUEST_BODY|ARGS|ARGS_NAMES "@rx (\$or|\$and|\$ne|\$gt|\$gte|\$lt|\$lte|\$in|\$nin|\$all|\$exists|\$type|\$size|\$regex|\$text|\$where)\s*:" \
    "id:910011,phase:2,deny,log,msg:'GraphQL: NoSQL Operator Injection Detected',severity:'ERROR',tag:'attack-graphql'"

# [910012] GraphQL 命令注入
SecRule REQUEST_BODY|ARGS|ARGS_NAMES "@rx (cmd|exec|system|eval|runtime)\s*:\s*['\"][^'\"]*(;|&|\||`|\$\(|cat|curl|wget|bash|sh)[^'\"]*['\"]" \
    "id:910012,phase:2,deny,log,msg:'GraphQL: Command Injection Parameter',severity:'ERROR',tag:'attack-graphql'"

# [910013] GraphQL XSS 注入
SecRule REQUEST_BODY|ARGS|ARGS_NAMES "@rx (input|message|comment|content|name|title|description|bio|status)\s*:\s*['\"][^'\"]*(<script|javascript:|onerror|onload|alert|prompt|confirm)[^'\"]*['\"]" \
    "id:910013,phase:2,deny,log,msg:'GraphQL: XSS Payload in String Field',severity:'ERROR',tag:'attack-graphql'"

# [910014] GraphQL 变量注入
SecRule REQUEST_BODY "@rx \"variables\":\s*\{[^}]*['\"](or|and|select|union)[^}]*\}" \
    "id:910014,phase:2,deny,log,msg:'GraphQL: Variable Injection Detected',severity:'ERROR',tag:'attack-graphql'"

# [910015] GraphQL 内联片段注入
SecRule REQUEST_BODY "@rx \.\.\.\s+[a-zA-Z_]+\s+@\s*[a-zA-Z_]+" \
    "id:910015,phase:2,log,msg:'GraphQL: Inline Fragment with Directive Detected',severity:'NOTICE',tag:'attack-graphql'"

# [910016] GraphQL 指令滥用
SecRule REQUEST_BODY "@rx @\s*(skip|include|deprecated|specifiedBy|defer|stream|live|cacheControl|rateLimit|auth|role|permission)" \
    "id:910016,phase:2,log,msg:'GraphQL: Directive Usage Detected',severity:'NOTICE',tag:'attack-graphql'"

# ------------------------------------------------------------------
# 3. JSON 注入/攻击 (910020-910029)
# ------------------------------------------------------------------

# [910020] JSON 注释注入
SecRule REQUEST_BODY|ARGS|ARGS_NAMES "@rx \/\*.*\*\/" \
    "id:910020,phase:2,deny,log,msg:'JSON: Comment Injection Detected',severity:'ERROR',tag:'attack-json'"

# [910021] JSON 键名污染
SecRule JSON:__proto__|JSON:prototype|JSON:constructor "@rx ." \
    "id:910021,phase:2,deny,log,msg:'JSON: Prototype Pollution (__proto__/constructor)',severity:'CRITICAL',tag:'attack-json'"

# [910022] JSON 重复键名
SecRule REQUEST_BODY "@rx \"[a-zA-Z0-9_]+\"\s*:\s*[^,}]+,\s*\"[a-zA-Z0-9_]+\"\s*:\s*[^,}]+,\s*\"[a-zA-Z0-9_]+\"\s*:\s*[^,}]+" \
    "id:910022,phase:2,deny,log,msg:'JSON: Multiple Keys Detected (Potential Smuggling)',severity:'ERROR',tag:'attack-json'"

# [910023] JSON 数组大小攻击
SecRule REQUEST_BODY "@rx \[\s*[^\[\]]{1000,}\s*\]" \
    "id:910023,phase:2,deny,log,msg:'JSON: Large Array Detected (DoS)',severity:'ERROR',tag:'attack-json'"

# [910024] JSON 深度嵌套
SecRule REQUEST_BODY "@rx (\{[^{}]*\{[^{}]*\{[^{}]*\{[^{}]*\{[^{}]*\{[^{}]*\{[^{}]*\{[^{}]*\{[^{}]*\{[^{}]*\})" \
    "id:910024,phase:2,deny,log,msg:'JSON: Deep Nesting Detected (DoS)',severity:'ERROR',tag:'attack-json'"

# [910025] JSON 字符串转义注入
SecRule REQUEST_BODY|ARGS|ARGS_NAMES "@rx \\\\u[0-9a-f]{4}" \
    "id:910025,phase:2,log,msg:'JSON: Unicode Escape Sequence Detected',severity:'NOTICE',tag:'attack-json'"

# [910026] JSON 数字溢出
SecRule REQUEST_BODY|ARGS|ARGS_NAMES "@rx :\s*-?[0-9]{20,}" \
    "id:910026,phase:2,deny,log,msg:'JSON: Integer Overflow Attack',severity:'ERROR',tag:'attack-json'"

# [910027] JSON 布尔注入
SecRule REQUEST_BODY|ARGS|ARGS_NAMES "@rx (true|false|null)\s*,\s*(true|false|null)\s*,\s*(true|false|null)" \
    "id:910027,phase:2,log,msg:'JSON: Multiple Boolean Values Detected',severity:'NOTICE',tag:'attack-json'"

# ------------------------------------------------------------------
# 4. JWT 攻击 (910030-910039)
# ------------------------------------------------------------------

# [910030] JWT None 算法 (原有规则增强)
SecRule ARGS:jwt.header.alg "@streq none" \
    "id:910030,phase:1,deny,log,msg:'JWT: None Algorithm Detected',severity:'ERROR',score:7,tag:'attack-jwt'"

# [910031] JWT HS256 密钥混淆
SecRule REQUEST_HEADERS:Authorization "@rx eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9" \
    "chain"
    SecRule REQUEST_HEADERS:Authorization "@rx [a-zA-Z0-9_-]{20,}" \
    "id:910031,phase:1,log,msg:'JWT: HS256 Algorithm with Weak Signature',severity:'ERROR',score:1,tag:'attack-jwt'"

# [910032] JWT 空签名
SecRule REQUEST_HEADERS:Authorization "@rx ^(?:Bearer\s+)?[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.$" \
    "id:910032,phase:1,deny,log,msg:'JWT: Empty Signature Detected',severity:'INFO',tag:'attack-jwt'"

# [910033] JWT 过期/修改
SecRule REQUEST_HEADERS:Authorization "@rx \"exp\"\s*:\s*[0-9]{4,}" \
    "id:910033,phase:1,log,msg:'JWT: Expiration Claim Detected',severity:'NOTICE',tag:'attack-jwt'"

# [910034] JWT 角色篡改
SecRule ARGS:json.role|ARGS:json.permission|ARGS:json.scope|ARGS:json.group|ARGS:json.privilege|ARGS:role|ARGS:permission|ARGS:scope|ARGS:group|ARGS:privilege "@rx \b(admin|root|superuser|sudo|god|owner|sysadmin)\b" \
    "id:910034,phase:2,deny,log,msg:'JWT: Role/Privilege Tampering Detected',severity:'CRITICAL',tag:'attack-jwt'"

# [910035] JWT 算法混淆 (RS256 -> HS256)
SecRule REQUEST_HEADERS:Authorization "@rx eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9" \
    "chain"
    SecRule REQUEST_HEADERS:Authorization "@rx [a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+" \
    "id:910035,phase:1,log,msg:'JWT: Algorithm Confusion (RS256 to HS256)',severity:'ERROR',score:1,tag:'attack-jwt'"

# [910036] JWT 无签名
SecRule REQUEST_HEADERS:Authorization "@rx ^(?:bearer\s+)?[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+$" \
    "id:910036,phase:1,deny,log,msg:'JWT: Missing Signature (Unsafe)',severity:'ERROR',tag:'attack-jwt'"

# [910037] JWT 格式异常
SecRule REQUEST_HEADERS:Authorization "@rx ^(?:bearer\s+)?[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+$" \
    "id:910037,phase:1,log,msg:'JWT: Standard Format Detected',severity:'NOTICE',tag:'attack-jwt'"

# ------------------------------------------------------------------
# 5. API 路径/端点探测 (910040-910049)
# ------------------------------------------------------------------

# [910040] 敏感 API 端点 (原有规则增强)
SecRule REQUEST_URI "@rx (?i)(/api/v[0-9]+/(admin|system|config|settings|users|accounts|auth|login|register|reset-password|change-password|profile|dashboard|analytics|reports|logs|audit|metrics|health|info|env|status|debug|trace|dump|heapdump)|/api/(admin|system|config|settings|users|accounts|auth|login|register)|/graphql|/v2/api-docs|/v3/api-docs|/swagger|/openapi)" \
    "id:910040,phase:2,log,msg:'API: Sensitive Endpoint Access Detected',severity:'ERROR',score:1,tag:'api-abuse'"

# [910041] API 版本探测
SecRule REQUEST_URI "@rx /api/v[0-9]+/" \
    "id:910041,phase:2,log,msg:'API: Version Enumeration Detected',severity:'NOTICE',tag:'api-abuse'"

# [910042] API 批量操作
SecRule REQUEST_URI "@rx /api/.*/batch|/api/.*/bulk|/api/.*/multiple" \
    "id:910042,phase:2,deny,log,msg:'API: Batch/Bulk Operation Detected',severity:'ERROR',tag:'api-abuse'"

# [910043] API 分页滥用
SecRule REQUEST_URI "@rx (page|offset|limit|per_page|size)=\s*[0-9]{4,}" \
    "id:910043,phase:2,log,msg:'API: Large Pagination Parameters Detected',severity:'NOTICE',tag:'api-abuse'"

# [910044] API 过滤/排序注入
SecRule ARGS|ARGS_NAMES "@rx (filter|sort|order|where|condition|match|search)\s*=\s*[^&]*(;|or|and|select|exec|eval)" \
    "id:910044,phase:2,deny,log,msg:'API: Filter/Sort Parameter Injection',severity:'ERROR',tag:'api-abuse'"

# [910045] API 文件上传端点
SecRule REQUEST_URI "@rx /api/.*/(upload|import|attach|file|media|image|avatar|document|attachment|import-csv|import-excel)" \
    "id:910045,phase:2,log,msg:'API: File Upload Endpoint Detected',severity:'NOTICE',tag:'api-abuse'"

# ------------------------------------------------------------------
# 6. API 参数污染/绕过 (910050-910059)
# ------------------------------------------------------------------

# [910050] 重复参数检测 (HTTP 参数污染)
SecRule REQUEST_URI "@rx &[a-zA-Z0-9_]+=[^&]*&[a-zA-Z0-9_]+=[^&]*&[a-zA-Z0-9_]+=[^&]*&[a-zA-Z0-9_]+=[^&]*" \
    "id:910050,phase:2,deny,log,msg:'API: HTTP Parameter Pollution (Duplicate Params)',severity:'ERROR',tag:'api-abuse'"

# [910051] 数组参数注入
SecRule ARGS|ARGS_NAMES "@rx [a-zA-Z0-9_]+\[[a-zA-Z0-9_]*\]" \
    "id:910051,phase:2,log,msg:'API: Array Parameter Detected',severity:'NOTICE',tag:'api-abuse'"

# [910052] 参数类型混淆
SecRule ARGS_NAMES "@rx [a-zA-Z0-9_]+_type\s*=\s*[a-zA-Z]+" \
    "id:910052,phase:2,deny,log,msg:'API: Parameter Type Coercion Attack',severity:'ERROR',tag:'api-abuse'"

# [910053] 对象 ID 注入
SecRule ARGS|ARGS_NAMES "@rx (id|ids|user_id|post_id|comment_id|order_id|product_id)\s*=\s*[^&]*(or|and|select|union|exec|eval|drop|insert|update|delete)" \
    "id:910053,phase:2,deny,log,msg:'API: Object ID Injection',severity:'ERROR',tag:'api-abuse'"

# [910054] API 密钥泄露检测
SecRule REQUEST_HEADERS:Authorization "@rx (Bearer|Token|APIKey|X-API-Key)\s+[a-zA-Z0-9_-]{30,}" \
    "id:910054,phase:1,log,msg:'API: Authorization Token Detected',severity:'NOTICE',score:1,tag:'api-abuse'"

# [910055] CORS 预检滥用
SecRule REQUEST_METHOD "@streq OPTIONS" \
    "chain"
    SecRule REQUEST_HEADERS:Access-Control-Request-Method "@rx ." \
    "id:910055,phase:1,log,msg:'API: CORS Preflight Request Detected',severity:'NOTICE',tag:'api-abuse'"

# ------------------------------------------------------------------
# 7. API 速率/滥用检测 (910060-910069)
# ------------------------------------------------------------------

# [910060] 无 User-Agent API 请求
SecRule REQUEST_HEADERS:User-Agent "@rx ^$" \
    "chain"
    SecRule REQUEST_URI "@rx /api/" \
    "id:910060,phase:1,log,msg:'API: Missing User-Agent in API Request',severity:'ERROR',tag:'api-abuse'"

# [910061] 无 Referer API 请求
SecRule REQUEST_HEADERS:Referer "@rx ^$" \
    "chain"
    SecRule REQUEST_URI "@rx /api/" \
    "id:910061,phase:1,log,msg:'API: Missing Referer in API Request',severity:'NOTICE',tag:'api-abuse'"

# [910062] API 请求 Content-Type 检查
SecRule REQUEST_HEADERS:Content-Type "@rx application/json" \
    "id:910062,phase:1,log,msg:'API: JSON API Request',severity:'INFO',score:0,tag:'api-abuse'"

# [910063] API 请求 Accept 头检查
SecRule REQUEST_HEADERS:Accept "@rx application/json" \
    "id:910063,phase:1,log,msg:'API: JSON Accept Header Detected',severity:'NOTICE',tag:'api-abuse'"

# [910064] API 大请求体
SecRule REQUEST_BODY "@gt 1048576" \
    "chain"
    SecRule REQUEST_URI "@rx /api/" \
    "id:910064,phase:2,log,msg:'API: Large Request Body > 1MB',severity:'ERROR',tag:'api-abuse'"

# [910065] API 频繁操作模式 (多个 POST/UPDATE)
SecRule REQUEST_URI "@rx /api/.*/(add|create|update|delete|remove|save)" \
    "id:910065,phase:2,log,msg:'API: Write Operation Detected',severity:'NOTICE',tag:'api-abuse'"

# ------------------------------------------------------------------
# 8. API 认证/授权绕过 (910070-910079)
# ------------------------------------------------------------------

# [910070] 权限提升尝试
SecRule ARGS|ARGS_NAMES "@rx (admin|root|super|sudo|god|owner|sysadmin)\s*=\s*(true|1|yes|on|true)" \
    "id:910070,phase:2,deny,log,msg:'API: Privilege Escalation Attempt',severity:'ERROR',tag:'api-abuse'"

# [910071] 角色覆盖 (原有规则增强)
SecRule ARGS|ARGS_NAMES "@rx (role|permission|scope|group|level|access)\s*=\s*(admin|root|super|superuser|sysadmin|owner|sudoer)" \
    "id:910071,phase:2,deny,log,msg:'API: Role Override Field Detected',severity:'ERROR',tag:'api-abuse'"

# [910072] 用户ID篡改
SecRule ARGS|ARGS_NAMES "@rx user_id\s*=\s*(?:0|00|000|9999[0-9]*|[1-9][0-9]{5,})" \
    "id:910072,phase:2,deny,log,msg:'API: User ID Tampering (Potential IDOR)',severity:'CRITICAL',tag:'api-abuse'"

# [910073] 会话/令牌泄露
SecRule ARGS|ARGS_NAMES "@rx (token|session|jwt|access_token|refresh_token|api_key|secret)\s*=\s*[a-zA-Z0-9_-]{20,}" \
    "id:910073,phase:2,deny,log,msg:'API: Session Token/API Key in URL Parameter',severity:'ERROR',tag:'api-abuse'"

# [910074] X-User-ID 头篡改
SecRule REQUEST_HEADERS:X-User-ID "@rx [0-9]+" \
    "id:910074,phase:1,deny,log,msg:'API: X-User-ID Header Spoofing',severity:'ERROR',tag:'api-abuse'"

# [910075] X-Role 头篡改
SecRule REQUEST_HEADERS:X-Role "@rx (admin|root|superuser|sysadmin)" \
    "id:910075,phase:1,deny,log,msg:'API: X-Role Header Spoofing',severity:'ERROR',tag:'api-abuse'"

# ------------------------------------------------------------------
# 9. gRPC/Protobuf 检测 (910080-910089)
# ------------------------------------------------------------------

# [910080] gRPC 内容类型
SecRule REQUEST_HEADERS:Content-Type "@rx application/grpc|application/grpc-web" \
    "id:910080,phase:1,log,msg:'gRPC: Protocol Buffer Request Detected',severity:'NOTICE',tag:'api-abuse'"

# [910081] gRPC 路径格式
SecRule REQUEST_URI "@rx /[a-zA-Z0-9_.]+/[a-zA-Z0-9_]+/[a-zA-Z0-9_]+" \
    "id:910081,phase:2,log,msg:'gRPC: Method Path Pattern Detected',severity:'INFO',tag:'api-abuse'"

# [910082] Protobuf 二进制检测
SecRule REQUEST_BODY "@rx [\x00-\x08\x0B\x0C\x0E-\x1F]{10,}" \
    "chain"
    SecRule REQUEST_HEADERS:Content-Type "@rx application/grpc" \
    "id:910082,phase:2,log,msg:'gRPC: Binary Protobuf Data Detected',severity:'NOTICE',tag:'api-abuse'"

# [910083] gRPC 反射探测
SecRule REQUEST_URI "@rx /grpc.reflection.v1alpha.ServerReflection/|/grpc.health.v1.Health/Check" \
    "id:910083,phase:2,deny,log,msg:'gRPC: Reflection/Health Service Probe',severity:'ERROR',tag:'api-abuse'"

# [910084] gRPC 认证绕过
SecRule REQUEST_HEADERS "@rx Authorization" \
    "chain"
    SecRule REQUEST_URI "@rx /[a-zA-Z0-9_.]+/[a-zA-Z0-9_]+/[a-zA-Z0-9_]+" \
    "id:910084,phase:1,log,msg:'gRPC: Missing Authorization Header',severity:'ERROR',tag:'api-abuse'"

# ------------------------------------------------------------------
# 10. 综合检测 (910090-910099)
# ------------------------------------------------------------------

# [910090] API 攻击链组合
SecRule REQUEST_URI "@rx /api/" \
    "chain"
    SecRule ARGS|ARGS_NAMES "@rx (admin|root|id|role).*(or|and|select|union|exec|eval)" \
    "id:910090,phase:2,log,msg:'API: Multi-stage API Attack Chain',severity:'ERROR',tag:'api-abuse'"

# [910091] GraphQL + 认证绕过组合
SecRule ARGS:query "@rx __schema|__type" \
    "chain"
    SecRule REQUEST_HEADERS:Authorization "@rx ^$" \
    "id:910091,phase:2,log,msg:'GraphQL: Introspection without Authentication',severity:'ERROR',tag:'attack-graphql'"

# [910092] JWT + GraphQL 组合攻击
SecRule REQUEST_HEADERS:Authorization "@rx ^(?:Bearer\s+)?[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]*$" \
    "chain"
    SecRule ARGS:query "@rx __schema|__type" \
    "id:910092,phase:2,log,msg:'GraphQL: Introspection with JWT (Potential Privilege Escalation)',severity:'ERROR',tag:'attack-graphql'"

# [910093] JSON + JWT 组合攻击
SecRule REQUEST_HEADERS:Authorization "@rx ^(?:Bearer\s+)?[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]*$" \
    "chain"
    SecRule REQUEST_BODY|ARGS_NAMES "@rx (__proto__|prototype|constructor)" \
    "id:910093,phase:2,log,msg:'API: JWT + JSON Prototype Pollution',severity:'ERROR',tag:'attack-json'"

# [910094] GraphQL 高频请求检测
SecRule ARGS:query "@rx ." \
    "id:910094,phase:2,log,msg:'GraphQL: Request Detected',severity:'NOTICE',tag:'attack-graphql'"
