# Aegis-WAF T149 API, JSON, GraphQL and JWT rule pack.
SecRule ARGS "@contains __schema" "id:910001,phase:2,deny,log,msg:'GraphQL introspection schema probe',severity:'ERROR',tag:'aegis-category-api',tag:'attack-graphql'"
SecRule ARGS "@contains __type" "id:910002,phase:2,deny,log,msg:'GraphQL introspection type probe',severity:'ERROR',tag:'aegis-category-api',tag:'attack-graphql'"
SecRule ARGS "@contains mutation{" "id:910003,phase:2,log,msg:'GraphQL mutation request requires API inspection',severity:'NOTICE',tag:'aegis-category-api',tag:'attack-graphql'"
SecRule ARGS "@contains jwt_alg_none" "id:910004,phase:2,deny,log,msg:'JWT none algorithm token indicator',severity:'CRITICAL',tag:'aegis-category-api',tag:'attack-jwt'"
SecRule REQUEST_HEADERS "@contains eyJhbGciOiJub25l" "id:910005,phase:1,deny,log,msg:'JWT none algorithm authorization header',severity:'CRITICAL',tag:'aegis-category-api',tag:'attack-jwt'"
SecRule ARGS "@contains api_role_admin_override" "id:910006,phase:2,log,msg:'API role override field requires policy inspection',severity:'NOTICE',tag:'aegis-category-api',tag:'api-abuse'"
