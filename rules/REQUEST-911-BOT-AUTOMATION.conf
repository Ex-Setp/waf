# Aegis-WAF T149 bot and automation rule pack.
SecRule REQUEST_HEADERS "@contains python-requests" "id:911001,phase:1,deny,log,msg:'Automation User-Agent python-requests',severity:'CRITICAL',tag:'aegis-category-bot',tag:'automation-bot'"
SecRule REQUEST_HEADERS "@contains Go-http-client" "id:911002,phase:1,deny,log,msg:'Automation User-Agent Go-http-client',severity:'CRITICAL',tag:'aegis-category-bot',tag:'automation-bot'"
SecRule REQUEST_HEADERS "@contains curl/" "id:911003,phase:1,log,msg:'Command line HTTP client observed',severity:'NOTICE',tag:'aegis-category-bot',tag:'automation-bot'"
SecRule REQUEST_HEADERS "@contains HeadlessChrome" "id:911004,phase:1,deny,log,msg:'Headless browser automation User-Agent',severity:'CRITICAL',tag:'aegis-category-bot',tag:'automation-bot'"
SecRule REQUEST_HEADERS "@contains zgrab" "id:911005,phase:1,deny,log,msg:'Internet scanner zgrab User-Agent',severity:'ERROR',tag:'aegis-category-bot',tag:'automation-scanner'"
SecRule REQUEST_URI "@contains /.env" "id:911006,phase:2,deny,log,msg:'Bot environment file discovery probe',severity:'ERROR',tag:'aegis-category-bot',tag:'automation-bot'"
