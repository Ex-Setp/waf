# ============================================================
# Aegis-WAF T149 Bot and Automation Rule Pack
# ============================================================
# 覆盖：自动化工具User-Agent检测、无头浏览器指纹、
#       爬虫/蜘蛛检测、请求频率特征、行为分析
# ============================================================

# ------------------------------------------------------------------
# 1. 自动化工具 User-Agent (911001-911009)
# ------------------------------------------------------------------

# [911001] python-requests (原有规则增强)
SecRule REQUEST_HEADERS:User-Agent "@rx (?i)(python-requests|python-urllib|python/)" \
    "id:911001,phase:1,deny,log,msg:'Bot: Python HTTP Client Detected',severity:'CRITICAL',tag:'automation-bot'"

# [911002] Go-http-client (原有规则增强)
SecRule REQUEST_HEADERS:User-Agent "@rx (?i)(Go-http-client|Go/|golang)" \
    "id:911002,phase:1,deny,log,msg:'Bot: Go HTTP Client Detected',severity:'CRITICAL',tag:'automation-bot'"

# [911003] curl (原有规则增强)
SecRule REQUEST_HEADERS:User-Agent "@rx (?i)(curl/|curl-)" \
    "id:911003,phase:1,log,msg:'Bot: curl Command Line Client Detected',severity:'NOTICE',tag:'automation-bot'"

# [911004] Headless Chrome (原有规则增强)
SecRule REQUEST_HEADERS:User-Agent "@rx (?i)(HeadlessChrome|PhantomJS|HtmlUnit|WebDriver|Selenium|Puppeteer|Playwright)" \
    "id:911004,phase:1,deny,log,msg:'Bot: Headless Browser Automation Detected',severity:'CRITICAL',tag:'automation-bot'"

# [911005] zgrab 扫描器 (原有规则增强)
SecRule REQUEST_HEADERS:User-Agent "@rx (?i)(zgrab|masscan|zmap|nmap|Nmap|nmap-script)" \
    "id:911005,phase:1,deny,log,msg:'Bot: Internet Scanner User-Agent Detected',severity:'CRITICAL',tag:'automation-scanner'"

# [911006] 其他常见自动化工具
SecRule REQUEST_HEADERS:User-Agent "@rx (?i)(axios|node-fetch|http-client|java-http-client|apache-httpclient|okhttp|retrofit|rest-client|unirest|superagent|fetch|request|urllib3|httpx|aiohttp|tornado|scrapy|selenium|webdriver)" \
    "id:911006,phase:1,deny,log,msg:'Bot: Common HTTP Client/Automation Tool Detected',severity:'CRITICAL',tag:'automation-bot'"

# [911007] 云/基础设施扫描器
SecRule REQUEST_HEADERS:User-Agent "@rx (?i)(Shodan|Censys|Zoomeye|Fofa|BinaryEdge|SecurityTrails|Onyphe|Rapid7|Qualys|Nessus|OpenVAS|Nexpose)" \
    "id:911007,phase:1,deny,log,msg:'Bot: Cloud/Infrastructure Scanner Detected',severity:'CRITICAL',tag:'automation-scanner'"

# [911008] 漏洞扫描器
SecRule REQUEST_HEADERS:User-Agent "@rx (?i)(Acunetix|Netsparker|AppScan|Burp|Zap|W3af|Wfuzz|Ffuf|Gobuster|Dirbuster|Nikto|WPScan|JoomScan|Droopescan)" \
    "id:911008,phase:1,deny,log,msg:'Bot: Vulnerability Scanner Detected',severity:'CRITICAL',tag:'automation-scanner'"

# [911009] 恶意/伪造 User-Agent
SecRule REQUEST_HEADERS:User-Agent "@rx (Mozilla/5\\.0\s*\\(compatible\\)|Mozilla/4\\.0\\s*\\(compatible.*MSIE.*\\)\\s*$)" \
    "id:911009,phase:1,deny,log,msg:'Bot: Suspicious/Fake User-Agent Pattern',severity:'CRITICAL',tag:'automation-bot'"

# ------------------------------------------------------------------
# 2. 无头浏览器指纹 (911010-911019)
# ------------------------------------------------------------------

# [911010] Headless Chrome 特征
SecRule REQUEST_HEADERS:User-Agent "@rx HeadlessChrome" \
    "chain"
    SecRule REQUEST_HEADERS:Accept-Language "@rx [a-z]{2}-[A-Z]{2}" \
    "id:911010,phase:1,log,msg:'Bot: Headless Chrome with Missing Accept-Language',severity:'CRITICAL',tag:'automation-bot'"

# [911011] Selenium WebDriver 特征
SecRule REQUEST_HEADERS "@rx window.navigator" \
    "id:911011,phase:1,log,msg:'Bot: Selenium WebDriver Fingerprint',severity:'WARNING',tag:'automation-bot'"

# [911012] PhantomJS 特征
SecRule REQUEST_HEADERS:User-Agent "@rx PhantomJS" \
    "id:911012,phase:1,deny,log,msg:'Bot: PhantomJS Headless Browser Detected',severity:'WARNING',tag:'automation-bot'"

# [911013] Puppeteer 特征
SecRule REQUEST_HEADERS:User-Agent "@rx Puppeteer" \
    "chain"
    SecRule REQUEST_HEADERS:Accept "@rx text/html,application/xhtml+xml" \
    "id:911013,phase:1,log,msg:'Bot: Puppeteer Automation Detected',severity:'WARNING',tag:'automation-bot'"

# [911014] Playwright 特征
SecRule REQUEST_HEADERS:User-Agent "@rx Playwright" \
    "id:911014,phase:1,deny,log,msg:'Bot: Playwright Automation Detected',severity:'WARNING',tag:'automation-bot'"

# [911015] 无头浏览器缺少 JavaScript 支持
SecRule REQUEST_HEADERS:Accept-Language "^$" \
    "chain"
    SecRule REQUEST_HEADERS:User-Agent "@rx Chrome" \
    "id:911015,phase:1,log,msg:'Bot: Headless Browser (Missing Accept-Language)',severity:'WARNING',tag:'automation-bot'"

# ------------------------------------------------------------------
# 3. 爬虫/蜘蛛检测 (911020-911029)
# ------------------------------------------------------------------

# [911020] 知名搜索引擎爬虫 (允许但是跟踪)
SecRule REQUEST_HEADERS:User-Agent "@rx (?i)(Googlebot|Bingbot|Slurp|DuckDuckBot|Baiduspider|YandexBot|Sogou|Exabot|Facebot|Twitterbot|Applebot|LinkedInBot|Pinterestbot|WhatsApp)" \
    "id:911020,phase:1,log,msg:'Bot: Search Engine Crawler Detected',severity:'NOTICE',tag:'automation-crawler'"

# [911021] 恶意爬虫
SecRule REQUEST_HEADERS:User-Agent "@rx (?i)(HTTrack|WebCopier|WebZIP|Teleport|Offline Explorer|Wget|wget|Lwp|LWP|libwww|WWW-Mechanize)" \
    "id:911021,phase:1,deny,log,msg:'Bot: Malicious/Offline Crawler Detected',severity:'WARNING',tag:'automation-bot'"

# [911022] 数据采集爬虫
SecRule REQUEST_HEADERS:User-Agent "@rx (?i)(Scrapy|BeautifulSoup|Soupx|MechanicalSoup|RoboBrowser|Goutte|Symfony|Panther|CasperJS|NightmareJS|TestCafe|Cypress)" \
    "id:911022,phase:1,deny,log,msg:'Bot: Data Scraping/Testing Tool Detected',severity:'WARNING',tag:'automation-bot'"

# [911023] 社交媒体爬虫
SecRule REQUEST_HEADERS:User-Agent "@rx (?i)(facebookexternalhit|Facebot|Twitterbot|LinkedInBot|Pinterestbot|WhatsApp|TelegramBot|Slackbot|Discordbot|RedditBot|Instagram)" \
    "id:911023,phase:1,log,msg:'Bot: Social Media Crawler Detected',severity:'NOTICE',tag:'automation-crawler'"

# [911024] 学术/研究爬虫
SecRule REQUEST_HEADERS:User-Agent "@rx (?i)(CommonCrawl|CCBot|ia_archiver|Alexa(?:bot)?|Archive\.org_bot|Wayback|SISTRIX|Moz(?:bot|scape)|SEMrushBot|AhrefsBot|Majestic(?:-12)?|ScreamingFrog|DotBot|MJ12bot)" \
    "id:911024,phase:1,log,msg:'Bot: Academic/Research Crawler Detected',severity:'INFO',tag:'automation-crawler'"

# ------------------------------------------------------------------
# 4. 请求频率/行为特征 (911030-911039)
# ------------------------------------------------------------------

# [911030] 无 Referer 请求 (可能的自动化)
SecRule REQUEST_HEADERS:Referer "^$" \
    "chain"
    SecRule REQUEST_URI "@rx /(css|js|png|jpg|jpeg|gif|svg|ico|woff|ttf|eot|pdf|doc|xls|zip|tar|gz|mp4|mp3|webm|ogg)/" \
    "id:911030,phase:1,log,msg:'Bot: Request Without Referer (Automation)',severity:'WARNING',tag:'automation-bot'"

# [911031] 缺少 Accept 头
SecRule REQUEST_HEADERS:Accept "^$" \
    "id:911031,phase:1,deny,log,msg:'Bot: Missing Accept Header',severity:'WARNING',tag:'automation-bot'"

# [911032] 缺少 Accept-Language 头
SecRule REQUEST_HEADERS:Accept-Language "^$" \
    "id:911032,phase:1,deny,log,msg:'Bot: Missing Accept-Language Header',severity:'WARNING',tag:'automation-bot'"

# [911033] 缺少 Accept-Encoding 头
SecRule REQUEST_HEADERS:Accept-Encoding "^$" \
    "id:911033,phase:1,log,msg:'Bot: Missing Accept-Encoding Header',severity:'NOTICE',tag:'automation-bot'"

# [911034] 缺少 Connection 头
SecRule REQUEST_HEADERS:Connection "^$" \
    "id:911034,phase:1,log,msg:'Bot: Missing Connection Header',severity:'NOTICE',tag:'automation-bot'"

# [911035] HTTP/1.0 请求 (自动化特征)
SecRule REQUEST_HEADERS "@rx HTTP/1\\.0" \
    "id:911035,phase:1,deny,log,msg:'Bot: HTTP/1.0 Protocol Detected (Automation)',severity:'WARNING',tag:'automation-bot'"

# [911036] 异常请求大小
SecRule REQUEST_BODY "@gt 1048576" \
    "chain"
    SecRule REQUEST_HEADERS:Content-Length "@rx [0-9]{7,}" \
    "id:911036,phase:2,log,msg:'Bot: Abnormal Large Request Body (Automation)',severity:'WARNING',tag:'automation-bot'"

# ------------------------------------------------------------------
# 5. 文件/路径探测特征 (911040-911049)
# ------------------------------------------------------------------

# [911040] 环境文件探测 (原有规则增强)
SecRule REQUEST_URI|ARGS|ARGS_NAMES "@rx (\.env|\.env\.local|\.env\.development|\.env\.production|\.env\.staging|\.env\.test|\.env\.example|\.env\.sample|\.env\.dist)" \
    "id:911040,phase:2,deny,log,msg:'Bot: Environment File Discovery Probe',severity:'WARNING',tag:'automation-bot'"

# [911041] 配置文件探测
SecRule REQUEST_URI|ARGS|ARGS_NAMES "@rx (\.git/config|\.svn/entries|\.hg/hgrc|\.htaccess|\.htpasswd|\.htgroup|\.htpasswd|\.ssh/id_rsa|\.ssh/id_dsa|\.ssh/authorized_keys)" \
    "id:911041,phase:2,deny,log,msg:'Bot: Configuration File Discovery Probe',severity:'WARNING',tag:'automation-bot'"

# [911042] 备份文件探测
SecRule REQUEST_URI "@rx \.(bak|backup|old|orig|temp|tmp|swp|swo|~|#)$" \
    "id:911042,phase:2,deny,log,msg:'Bot: Backup File Discovery Probe',severity:'WARNING',tag:'automation-bot'"

# [911043] 日志文件探测
SecRule REQUEST_URI "@rx (\.log$|/logs/|/debug\.|/trace\.|/error_log|/access_log|/audit\.log)" \
    "id:911043,phase:2,deny,log,msg:'Bot: Log File Discovery Probe',severity:'INFO',tag:'automation-bot'"

# [911044] 管理面板探测
SecRule REQUEST_URI "@rx (/admin|/administrator|/console|/dashboard|/manager|/management|/system|/webmaster|/webadmin|/siteadmin|/appadmin|/ops|/devops|/itadmin|/security|/audit|/monitor|/metrics|/stats|/status|/health|/info|/env|/config|/settings|/preferences|/analytics|/reports|/logs|/debug|/trace|/dump|/heapdump|/threaddump|/jstack|/jmap|/jcmd|/jstat|/jconsole|/visualvm|/jvisualvm|/jprofiler|/yourkit|/async-profiler|/perf|/flamegraph|/profiling|/jmx|/jolokia|/hawtio|/camel|/activemq|/rabbitmq|/kafka|/zookeeper|/etcd|/consul|/vault|/nomad|/terraform|/ansible|/chef|/puppet|/saltstack|/jenkins|/gitlab|/grafana|/prometheus|/alertmanager|/thanos|/loki|/tempo|/mimir|/cortex|/victoria|/influx|/telegraf|/collectd|/statsd|/graphite|/elasticsearch|/kibana|/logstash|/beats|/filebeat|/metricbeat|/auditbeat|/heartbeat|/packetbeat|/winlogbeat|/elastic-agent|/fleet|/agent|/elasticsearch|/opensearch|/opendistro|/opensearch-dashboards|/opensearch-dashboards|/opendistro|/opendistro)" \
    "id:911044,phase:2,deny,log,msg:'Bot: Admin Panel/Management Path Probe',severity:'INFO',tag:'automation-bot'"

# [911045] 版本控制文件探测
SecRule REQUEST_URI "@rx (\.git/|\.svn/|\.hg/|\.bzr/|\.cvs/|\.gitignore|\.gitattributes|\.gitmodules|\.git/config|\.git/HEAD|\.git/index|\.git/logs/|\.git/refs/|\.git/objects/|\.svn/entries|\.svn/wc\.db|\.svn/format|\.svn/pristine/)" \
    "id:911045,phase:2,deny,log,msg:'Bot: Version Control File Discovery Probe',severity:'WARNING',tag:'automation-bot'"

# [911046] 数据库文件探测
SecRule REQUEST_URI "@rx \.(sql|sqlite|db|mdb|accdb|fdb|dbf|sqlite3|db3|s3db|sl3)" \
    "id:911046,phase:2,deny,log,msg:'Bot: Database File Discovery Probe',severity:'INFO',tag:'automation-bot'"

# [911047] 敏感文件探测 (综合)
SecRule REQUEST_URI "@rx (/etc/passwd|/etc/shadow|/boot\.ini|/win\.ini|/system\.ini|/proc/self/environ|/var/log/|/var/lib/|/tmp/|/mnt/|/media/|/root/|/home/)" \
    "id:911047,phase:2,deny,log,msg:'Bot: Sensitive System File Probe',severity:'WARNING',tag:'automation-bot'"

# ------------------------------------------------------------------
# 6. API/端点探测特征 (911050-911059)
# ------------------------------------------------------------------

# [911050] API 文档探测
SecRule REQUEST_URI "@rx (?i)(/swagger(?:-ui)?|/api-docs|/v2/api-docs|/v3/api-docs|/swagger\.json|/openapi\.json|/graphiql|/playground|/altair|/voyager|/explorer)" \
    "id:911050,phase:2,deny,log,msg:'Bot: API Documentation Discovery Probe',severity:'WARNING',tag:'automation-bot'"

# [911051] WebSocket 探测
SecRule REQUEST_HEADERS:Upgrade "@rx websocket" \
    "chain"
    SecRule REQUEST_HEADERS:Connection "@rx upgrade" \
    "id:911051,phase:1,log,msg:'Bot: WebSocket Upgrade Request Detected',severity:'NOTICE',tag:'automation-bot'"

# [911052] GraphQL 内省探测 (Bot特征)
SecRule REQUEST_BODY|ARGS|ARGS_NAMES "@rx __schema|__type|__typename" \
    "chain"
    SecRule REQUEST_HEADERS:User-Agent "@rx (python-requests|curl|Go-http-client|axios)" \
    "id:911052,phase:2,log,msg:'Bot: GraphQL Introspection via Automation Tool',severity:'WARNING',tag:'automation-bot'"

# [911053] 批量路径探测
SecRule REQUEST_URI "@rx /[a-zA-Z0-9_]{10,}/[a-zA-Z0-9_]{10,}/[a-zA-Z0-9_]{10,}" \
    "id:911053,phase:2,deny,log,msg:'Bot: Automated Path Brute-Force Pattern',severity:'WARNING',tag:'automation-bot'"

# [911054] 常见管理路径探测
SecRule REQUEST_URI "@rx /(cgi-bin|phpmyadmin|myadmin|mysql|adminer|sqlite|mongoadmin|redis-admin|couchdb|elasticsearch|kibana|grafana|prometheus|jupyter|hue|airflow|superset|metabase|redash|looker|powerbi|tableau)" \
    "id:911054,phase:2,deny,log,msg:'Bot: Common Management Interface Probe',severity:'WARNING',tag:'automation-bot'"

# [911055] 参数猜测探测
SecRule REQUEST_URI "@rx \?[a-zA-Z0-9_]{1,3}=[^&]*&[a-zA-Z0-9_]{1,3}=[^&]*&[a-zA-Z0-9_]{1,3}=[^&]*&[a-zA-Z0-9_]{1,3}=[^&]*&[a-zA-Z0-9_]{1,3}=[^&]*" \
    "id:911055,phase:2,deny,log,msg:'Bot: Parameter Brute-Force/Enumeration Pattern',severity:'WARNING',tag:'automation-bot'"

# ------------------------------------------------------------------
# 7. 异常 Headers 特征 (911060-911069)
# ------------------------------------------------------------------

# [911060] 异常 Accept-Language
SecRule REQUEST_HEADERS:Accept-Language "@rx ^[a-z]{2}-[A-Z]{2}$" \
    "id:911060,phase:1,log,msg:'Bot: Standard Accept-Language Detected',severity:'NOTICE',tag:'automation-bot'"

# [911061] 异常 Accept-Encoding
SecRule REQUEST_HEADERS:Accept-Encoding "@rx ^[a-z]+(,\s*[a-z]+)*$" \
    "id:911061,phase:1,log,msg:'Bot: Standard Accept-Encoding Detected',severity:'NOTICE',tag:'automation-bot'"

# [911062] 异常 Cache-Control
SecRule REQUEST_HEADERS:Cache-Control "@rx no-cache|no-store|max-age=0" \
    "id:911062,phase:1,log,msg:'Bot: Cache Control Header Detected',severity:'NOTICE',tag:'automation-bot'"

# [911063] 异常 Pragma
SecRule REQUEST_HEADERS:Pragma "@rx no-cache" \
    "id:911063,phase:1,log,msg:'Bot: Pragma No-Cache Header Detected',severity:'NOTICE',tag:'automation-bot'"

# [911064] 异常 Connection 值
SecRule REQUEST_HEADERS:Connection "@rx keep-alive|close|upgrade" \
    "id:911064,phase:1,log,msg:'Bot: Connection Header Detected',severity:'NOTICE',tag:'automation-bot'"

# [911065] X-Requested-With 头 (AJAX检测)
SecRule REQUEST_HEADERS:X-Requested-With "@rx XMLHttpRequest" \
    "id:911065,phase:1,log,msg:'Bot: XHR/AJAX Request Detected',severity:'NOTICE',tag:'automation-bot'"

# ------------------------------------------------------------------
# 8. 时间/频率特征 (911070-911079)
# ------------------------------------------------------------------

# [911070] 非标准请求时间
SecRule REQUEST_HEADERS:Date "@rx (Mon|Tue|Wed|Thu|Fri|Sat|Sun),\\s*[0-9]{2}\\s+[A-Za-z]{3}\\s+[0-9]{4}\\s+[0-9]{2}:[0-9]{2}:[0-9]{2}\\s+GMT" \
    "id:911070,phase:1,log,msg:'Bot: Valid HTTP Date Header',severity:'NOTICE',tag:'automation-bot'"

# [911071] 缺少 Date 头
SecRule REQUEST_HEADERS:Date "^$" \
    "id:911071,phase:1,log,msg:'Bot: Missing Date Header',severity:'NOTICE',tag:'automation-bot'"

# [911072] 快速连续请求特征
SecRule REQUEST_HEADERS "@rx \r\n\r\n" \
    "id:911072,phase:1,deny,log,msg:'Bot: Abnormal Request Format (Potential Automated Flood)',severity:'WARNING',tag:'automation-bot'"

# [911073] 无浏览器特征组合
SecRule REQUEST_HEADERS:User-Agent "@rx Mozilla" \
    "chain"
    SecRule REQUEST_HEADERS:Accept "@rx text/html" \
    "chain"
    SecRule REQUEST_HEADERS:Accept-Language "@rx [a-z]{2}-[A-Z]{2}" \
    "chain"
    SecRule REQUEST_HEADERS:Accept-Encoding "@rx gzip|deflate|br" \
    "id:911073,phase:1,log,msg:'Bot: Missing Browser Headers with Mozilla UA',severity:'WARNING',tag:'automation-bot'"

# ------------------------------------------------------------------
# 9. 综合检测 (911080-911089)
# ------------------------------------------------------------------

# [911080] 多Bot特征组合
SecRule REQUEST_HEADERS:User-Agent "@rx (python-requests|curl|Go-http-client|axios|node-fetch)" \
    "chain"
    SecRule REQUEST_URI "@rx (\.env|\.git|admin|/manager|/phpmyadmin|/cgi-bin)" \
    "id:911080,phase:2,log,msg:'Bot: Automation Tool + Sensitive Path Combination',severity:'WARNING',tag:'automation-bot'"

# [911081] 扫描器特征 + 敏感路径
SecRule REQUEST_HEADERS:User-Agent "@rx (sqlmap|nuclei|nikto|acunetix|netsparker|burp)" \
    "chain"
    SecRule REQUEST_URI "@rx (/api/|/graphql|/swagger|/admin|/\.env)" \
    "id:911081,phase:2,log,msg:'Bot: Scanner + API/Admin Path Combination',severity:'WARNING',tag:'automation-scanner'"

# [911082] 无头浏览器 + 管理路径
SecRule REQUEST_HEADERS:User-Agent "@rx (HeadlessChrome|PhantomJS|Puppeteer|Playwright)" \
    "chain"
    SecRule REQUEST_URI "@rx (/admin|/manager|/dashboard|/console)" \
    "id:911082,phase:2,log,msg:'Bot: Headless Browser + Admin Path Combination',severity:'WARNING',tag:'automation-bot'"

# [911083] 代理 + 自动化检测
SecRule REQUEST_HEADERS:Via "@rx ." \
    "chain"
    SecRule REQUEST_HEADERS:User-Agent "@rx (python-requests|curl|Go-http-client)" \
    "id:911083,phase:1,log,msg:'Bot: Automation Client via Proxy',severity:'WARNING',tag:'automation-bot'"

# [911084] 可疑User-Agent + 异常Headers组合
SecRule REQUEST_HEADERS:User-Agent "@rx Mozilla/5\\.0" \
    "chain"
    SecRule REQUEST_HEADERS:Accept "@rx text/html" \
    "chain"
    SecRule REQUEST_HEADERS:Accept-Language "@rx [a-z]{2}-[A-Z]{2}" \
    "id:911084,phase:1,log,msg:'Bot: Fake Browser UA with Missing Headers',severity:'WARNING',tag:'automation-bot'"
